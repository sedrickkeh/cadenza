<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cadenza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --paper:#f2ecdd; --paper2:#ece4d0;
  --ink:#231f18;
  --ink-70:rgba(35,31,24,.7); --ink-55:rgba(35,31,24,.55); --ink-35:rgba(35,31,24,.35);
  --ink-18:rgba(35,31,24,.18); --ink-08:rgba(35,31,24,.08);
  --red:#a8352a; --red-soft:rgba(168,53,42,.12);
  --serif:Palatino,"Palatino Linotype","Book Antiqua",Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--paper);
  background-image:
    url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer></filter><rect width="240" height="240" filter="url(%23n)"/></svg>'),
    radial-gradient(140% 100% at 50% 20%, var(--paper) 55%, var(--paper2) 100%);
  color:var(--ink);
  font-family:var(--serif);
}
::selection{background:var(--red-soft)}
button{font-family:var(--serif);color:var(--ink)}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.screen{position:fixed;inset:0;z-index:1;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.sc{font-variant:small-caps;letter-spacing:.22em}

/* ---------- engraved rule ---------- */
.rule{display:flex;align-items:center;gap:12px;color:var(--ink)}
.rule::before,.rule::after{content:"";flex:1;height:1px;background:var(--ink-35)}
.rule .dia{width:6px;height:6px;background:var(--ink);transform:rotate(45deg)}

/* ---------- buttons ---------- */
.btn{display:inline-block;background:transparent;border:1.5px solid var(--ink);border-radius:2px;
  padding:12px 36px;font-size:17px;letter-spacing:.14em;font-variant:small-caps;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.fill{background:var(--ink);color:var(--paper)}
.btn.fill:hover{background:var(--red);border-color:var(--red)}

/* ---------- title page ---------- */
#screen-title{align-items:center;justify-content:center;text-align:center}
.opus{font-size:12px;letter-spacing:.34em;font-variant:small-caps;color:var(--ink-55);margin-bottom:26px}
.titleGlyph{font-size:44px;line-height:1;margin-bottom:14px;color:var(--red)}
#screen-title h1{font-size:clamp(58px,11vw,108px);font-weight:600;letter-spacing:.14em;line-height:1;text-indent:.14em}
.tagline{font-size:14px;letter-spacing:.3em;font-variant:small-caps;color:var(--ink-55);margin:20px 0 40px}
#screen-title .rule{width:min(380px,74vw);margin-bottom:44px}
.keyHint{margin-top:34px;font-size:12px;color:var(--ink-35);letter-spacing:.1em;font-variant:small-caps}
.keyHint kbd{display:inline-block;border:1px solid var(--ink-35);border-radius:3px;padding:1px 8px;margin:0 2px;font-family:var(--serif);font-size:12px}

/* ---------- programme (song select) ---------- */
#screen-select.dragging::after{content:"lay the score upon the desk";position:fixed;inset:16px;z-index:50;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-style:italic;color:var(--ink);
  background:rgba(242,236,221,.93);border:1.5px dashed var(--ink);border-radius:4px;pointer-events:none}
.selHead{padding:34px 26px 6px;text-align:center;flex-shrink:0}
.selHead h2{font-size:30px;font-weight:600;letter-spacing:.3em;font-variant:small-caps;text-indent:.3em}
.selHead .sub{font-size:12px;letter-spacing:.24em;font-variant:small-caps;color:var(--ink-55);margin-top:4px}
.selHead .rule{width:min(340px,66vw);margin:18px auto 0}
#songGrid{flex:1;overflow-y:auto;padding:14px 0 26px;width:min(620px,94vw);margin:0 auto;
  display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--ink-18) transparent}
.suiteHead{display:flex;align-items:baseline;gap:14px;padding:26px 14px 8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--ink-18)}
.suiteHead h3{font-size:15px;font-variant:small-caps;letter-spacing:.26em;font-weight:600}
.suiteHead .prog{font-size:11.5px;font-style:italic;color:var(--ink-35)}
.suiteHead .chev{margin-left:auto;font-size:12px;color:var(--ink-55);transition:transform .18s}
.suiteHead.closed .chev{transform:rotate(-90deg)}
.suiteHead:hover h3{color:var(--red)}
.progRow.locked{opacity:.38;cursor:default}
.progRow.locked:hover{background:transparent}
.progRow.locked:hover .num{color:var(--ink-55)}
.diff-virtuoso .dName{color:var(--red)}
.progRow{position:relative;display:flex;align-items:baseline;gap:14px;padding:16px 14px;cursor:pointer;
  border-bottom:1px solid var(--ink-08);transition:background .15s}
.progRow:hover{background:rgba(35,31,24,.035)}
.progRow:hover .num{color:var(--red)}
.num{width:38px;text-align:right;font-size:16px;font-style:italic;color:var(--ink-55);flex-shrink:0;transition:color .15s}
.pMain{display:flex;flex-direction:column;gap:2px;min-width:0}
.pTitle{font-size:20px;font-weight:600;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pMeta{font-size:12px;color:var(--ink-55);letter-spacing:.04em}
.pStars{letter-spacing:.1em}
.leader{flex:1;border-bottom:1px dotted var(--ink-35);transform:translateY(-5px);min-width:24px}
.pComposer{font-size:12.5px;font-variant:small-caps;letter-spacing:.18em;color:var(--ink-70);flex-shrink:0}
.seal{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;
  border:1.5px solid var(--red);border-radius:50%;color:var(--red);font-size:13px;font-weight:600;
  transform:rotate(-8deg);align-self:center}
.sealGhost{width:30px;flex-shrink:0}
.delBtn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;
  background:transparent;color:var(--ink-35);font-size:16px;line-height:1;cursor:pointer;opacity:0;transition:opacity .15s}
.progRow:hover .delBtn{opacity:1}
.delBtn:hover{color:var(--red)}
.uploadRow .pTitle{font-style:italic;font-weight:400}
.uploadRow .num{color:var(--red)}

/* ---------- settings footer ---------- */
.settingsBar{flex-shrink:0;display:flex;flex-wrap:wrap;gap:14px 32px;align-items:center;justify-content:center;
  padding:13px 22px calc(15px + env(safe-area-inset-bottom));border-top:1px solid var(--ink-18);
  font-size:12px;color:var(--ink-70)}
.settingsBar label{display:flex;align-items:center;gap:9px;font-variant:small-caps;letter-spacing:.16em}
input[type=range]{-webkit-appearance:none;appearance:none;width:110px;height:2px;background:var(--ink-35);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--ink);border:none;cursor:pointer}
input[type=checkbox]{accent-color:var(--red);width:15px;height:15px}
#speedVal{color:var(--red);min-width:14px;text-align:center;font-feature-settings:"tnum"}

/* ---------- modal ---------- */
#modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(35,31,24,.32);padding:20px}
#modal.open{display:flex}
.modalBox{position:relative;width:min(440px,94vw);max-height:88vh;overflow-y:auto;background:var(--paper);
  border:1px solid var(--ink);outline:1px solid var(--ink-35);outline-offset:5px;
  padding:32px 30px;box-shadow:0 18px 60px rgba(35,31,24,.28)}
#modalClose{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--ink-55);font-size:24px;cursor:pointer;line-height:1}
#modalClose:hover{color:var(--red)}
.diffWrap{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.diffWrap h2{font-size:26px;font-weight:600}
.diffWrap .composer{font-size:12px;font-variant:small-caps;letter-spacing:.2em;color:var(--ink-55)}
.previewBtn{margin:14px 0 4px;background:transparent;border:1px solid var(--ink-35);border-radius:2px;
  padding:7px 22px;font-size:13px;font-variant:small-caps;letter-spacing:.18em;cursor:pointer;transition:all .15s}
.previewBtn:hover{border-color:var(--ink);background:rgba(35,31,24,.04)}
.previewBtn.playing{color:var(--red);border-color:var(--red)}
.diffList{width:100%;display:flex;flex-direction:column;margin-top:12px}
.diffRow{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:1px 12px;text-align:left;
  background:transparent;border:none;border-top:1px solid var(--ink-18);border-left:3px solid transparent;
  padding:14px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.diffRow:last-child{border-bottom:1px solid var(--ink-18)}
.diffRow:hover{border-left-color:var(--red);background:rgba(35,31,24,.03)}
.dName{font-size:19px;font-weight:600;letter-spacing:.02em}
.dStars{grid-column:2;grid-row:1;font-size:13px;color:var(--ink);align-self:center;letter-spacing:.12em}
.dStars .dim{color:var(--ink-18)}
.dNotes{font-size:11.5px;color:var(--ink-55);letter-spacing:.04em}
.dBest{grid-column:2;grid-row:2;font-size:11.5px;text-align:right;color:var(--red)}
.dBest.dim{color:var(--ink-35)}
.titleInput{width:100%;margin:10px 0 4px;background:transparent;border:none;border-bottom:1px solid var(--ink-35);
  color:var(--ink);font-family:var(--serif);font-size:20px;text-align:center;padding:8px 6px;outline:none;font-style:italic}
.titleInput:focus{border-color:var(--red)}
.cardMeta.center{text-align:center;font-size:12.5px;color:var(--ink-55);margin:8px 0 2px}
.primaryBtn{margin-top:16px}

/* ---------- game ---------- */
.gameHud{flex-shrink:0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;
  padding:calc(12px + env(safe-area-inset-top)) 20px 8px}
.hudLeft{min-width:0;display:flex;align-items:baseline;gap:12px}
#gSong{font-size:17px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#gDiff{font-size:10.5px;font-variant:small-caps;letter-spacing:.26em;color:var(--red)}
.hudRight{text-align:right;display:flex;align-items:baseline;gap:14px}
#gScore{font-size:19px;letter-spacing:.1em;font-feature-settings:"tnum"}
#gAcc{font-size:12px;color:var(--ink-55);font-feature-settings:"tnum"}
#pauseBtn{background:none;border:1px solid var(--ink-35);color:var(--ink-55);border-radius:2px;
  width:32px;height:32px;font-size:11px;cursor:pointer;flex-shrink:0;align-self:center}
#pauseBtn:hover{color:var(--ink);border-color:var(--ink)}
.progressTrack{height:2px;background:var(--ink-08);flex-shrink:0;margin:0 20px}
#gProgress{height:100%;width:0;background:var(--ink);transition:width .2s linear}
.lifeTrack{height:4px;background:var(--ink-08);flex-shrink:0;margin:3px 20px 0}
#gLife{height:100%;width:100%;background:var(--red);transition:width .15s linear}
#gLife.low{animation:lifePulse .55s ease-in-out infinite}
@keyframes lifePulse{50%{opacity:.3}}
#gameCanvas{flex:1;width:100%;touch-action:none}
#pauseMenu{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
  background:rgba(242,236,221,.92)}
#pauseMenu.open{display:flex}
.pauseBox{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center}
.pauseBox h2{font-size:34px;font-style:italic;font-weight:600;margin-bottom:12px}
.pauseBox .btn{width:230px}

/* ---------- results ---------- */
#screen-results{align-items:center;justify-content:center;text-align:center;padding:24px;gap:2px;overflow-y:auto}
#rSong{font-size:12px;font-variant:small-caps;letter-spacing:.24em;color:var(--ink-55);margin-bottom:20px}
#rGrade{width:128px;height:128px;border:3px solid currentColor;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:64px;font-weight:600;transform:rotate(-8deg);flex-shrink:0}
#rFlavor{font-style:italic;font-size:18px;color:var(--ink-70);margin-top:18px}
#rScore{font-size:38px;letter-spacing:.12em;margin-top:10px;font-feature-settings:"tnum"}
.chips{display:flex;gap:10px;margin-top:10px}
#rNewBest{display:none;font-size:11px;font-variant:small-caps;letter-spacing:.26em;color:var(--red);
  border:1px solid var(--red);border-radius:2px;padding:3px 14px}
#rFC{display:none;font-size:11px;font-variant:small-caps;letter-spacing:.26em;color:var(--ink);
  border:1px solid var(--ink);border-radius:2px;padding:3px 14px}
#lifetime{margin-top:12px;font-size:12.5px;font-style:italic;color:var(--ink-35)}
.seal.fc{box-shadow:0 0 0 2px var(--paper),0 0 0 3.5px var(--red)}
.rStats{display:flex;gap:34px;margin-top:20px}
.rStat .v{font-size:20px;font-feature-settings:"tnum"}
.rStat .l{font-size:10.5px;font-variant:small-caps;letter-spacing:.2em;color:var(--ink-35);margin-top:2px}
.rCounts{display:flex;gap:22px;margin-top:16px;font-size:13.5px;color:var(--ink-70)}
.rCounts b{font-weight:600;font-feature-settings:"tnum"}
.rCounts .rp{color:var(--red)}
#rTiming{font-style:italic;font-size:14px;color:var(--ink-55);margin-top:16px;min-height:18px}
.rBtns{display:flex;gap:14px;margin-top:22px}

/* ---------- grades ---------- */
.grade-SS,.grade-S{color:var(--red)} .grade-A{color:var(--ink)} .grade-B{color:var(--ink-70)}
.grade-C{color:var(--ink-55)} .grade-D{color:var(--ink-35)} .grade-F{color:var(--red)}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translate(-50%,16px);z-index:60;
  background:var(--paper);border:1px solid var(--ink);color:var(--ink);font-size:13.5px;font-style:italic;
  padding:10px 24px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:88vw;text-align:center;
  box-shadow:0 6px 24px rgba(35,31,24,.18)}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast.bad{border-color:var(--red);color:var(--red)}
@media (max-width:560px){
  .leader{display:none}
  .pComposer{display:none}
  .rStats{gap:22px}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="screen active" id="screen-title">
  <div class="opus">a rhythm recital &middot; op. 1</div>
  <div class="titleGlyph">&#10087;</div>
  <h1>CADENZA</h1>
  <div class="tagline">every score becomes a stage</div>
  <div class="rule"><span class="dia"></span></div>
  <button id="enterBtn" class="btn fill">Begin the recital</button>
  <div class="keyHint"><kbd>D</kbd><kbd>F</kbd><kbd>J</kbd><kbd>K</kbd> or arrow keys &middot; tap on touch</div>
  <div id="lifetime"></div>
</div>

<div class="screen" id="screen-select">
  <div class="selHead">
    <h2>Programme</h2>
    <div class="sub">choose a piece &middot; or bring your own</div>
    <div class="rule"><span class="dia"></span></div>
  </div>
  <div id="songGrid"></div>
  <div class="settingsBar">
    <label>Speed <input type="range" id="speedRange" min="1" max="10" step="1" value="5"><span id="speedVal">5</span></label>
    <label>Volume <input type="range" id="volRange" min="0" max="100" step="1" value="85"></label>
    <label>Hit sound <input type="checkbox" id="hitToggle" checked></label>
  </div>
  <input type="file" id="fileInput" accept=".xml,.musicxml,.mxl,.mid,.midi" style="display:none">
</div>

<div class="screen" id="screen-game">
  <div class="gameHud">
    <div class="hudLeft"><span id="gSong"></span><span id="gDiff"></span></div>
    <div class="hudRight"><span id="gScore">0000000</span><span id="gAcc">100.00%</span>
      <button id="pauseBtn" title="Pause (Esc)">&#10073;&#10073;</button></div>
  </div>
  <div class="progressTrack"><div id="gProgress"></div></div>
  <div class="lifeTrack" title="Ink"><div id="gLife"></div></div>
  <canvas id="gameCanvas"></canvas>
</div>

<div id="pauseMenu"><div class="pauseBox">
  <h2>Intermission</h2>
  <button id="resumeBtn" class="btn fill">Resume</button>
  <button id="restartBtn" class="btn">Restart</button>
  <button id="quitBtn" class="btn">Back to programme</button>
</div></div>

<div class="screen" id="screen-results">
  <div id="rSong"></div>
  <div id="rGrade">A</div>
  <div id="rFlavor"></div>
  <div id="rScore"></div>
  <div class="chips"><span id="rNewBest">new best</span><span id="rFC">full combo</span></div>
  <div class="rStats">
    <div class="rStat"><div class="v" id="rAcc"></div><div class="l">accuracy</div></div>
    <div class="rStat"><div class="v" id="rCombo"></div><div class="l">max combo</div></div>
    <div class="rStat"><div class="v" id="rImps"></div><div class="l">imps repelled</div></div>
  </div>
  <div class="rCounts">
    <span class="rp"><b id="rPerfect"></b> perfect</span>
    <span><b id="rGreat"></b> great</span>
    <span><b id="rGood"></b> good</span>
    <span><b id="rMiss"></b> miss</span>
  </div>
  <div id="rTiming"></div>
  <div class="rBtns"><button id="rRetry" class="btn">Encore</button><button id="rBack" class="btn fill">Programme</button></div>
</div>

<div id="modal"><div class="modalBox"><button id="modalClose">&times;</button><div id="modalBody"></div></div></div>
<div id="toast"></div>

<script>
/*__GAME_JS__*/
</script>
</body>
</html>
