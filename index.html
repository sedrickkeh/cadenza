  }

  /* ---------- upload flow ---------- */
  async function handleFile(file) {
    try {
      toast('Reading \u201C' + file.name + '\u201D\u2026');
      const name = file.name.toLowerCase();
      let parsed;
      if (name.endsWith('.mid') || name.endsWith('.midi')) {
        parsed = parseMIDI(await file.arrayBuffer(), file.name);
      } else if (name.endsWith('.mxl')) {
        parsed = await parseMXL(await file.arrayBuffer(), file.name);
      } else if (name.endsWith('.xml') || name.endsWith('.musicxml')) {
        parsed = parseMusicXML(await file.text(), file.name);
      } else {
        // sniff: zip magic → mxl, 'MThd' → midi, else xml
        const buf = await file.arrayBuffer();
        const b = new Uint8Array(buf.slice(0, 4));
        if (b[0] === 0x50 && b[1] === 0x4B) parsed = await parseMXL(buf, file.name);
        else if (b[0] === 0x4D && b[1] === 0x54 && b[2] === 0x68 && b[3] === 0x64) parsed = parseMIDI(buf, file.name);
        else parsed = parseMusicXML(new TextDecoder().decode(buf), file.name);
      }
      if (!parsed.events.length) throw new Error('No playable notes found.');
      showImportPreview(parsed, file.name);
    } catch (err) {
      toast(err.message || 'Could not read that file.', true);
    }
  }

  function showImportPreview(parsed, filename) {
    const dur = parsed.events[parsed.events.length - 1].t + (parsed.events[parsed.events.length - 1].dur || 0.5);
    const wrap = el('div', 'diffWrap');
    wrap.appendChild(el('h2', null, 'New score'));
    const titleIn = el('input', 'titleInput');
    titleIn.value = parsed.title || filename.replace(/\.[^.]+$/, '');
    titleIn.maxLength = 60;
    wrap.appendChild(titleIn);
    const stN = chartStats(buildChart(parsed.events, 'normal', parsed.bpmHint));
    wrap.appendChild(el('div', 'cardMeta center',
      fmtTime(dur) + ' \u2022 ' + parsed.events.length + ' notes \u2022 \u2248' + parsed.bpmHint + ' BPM \u2022 Normal: ' + '\u2605'.repeat(stN.stars)));
    const pv = el('button', 'previewBtn', '\u25B6 Preview');
    const fakeSong = { events: parsed.events };
    pv.addEventListener('click', () => togglePreview(fakeSong, pv));
    wrap.appendChild(pv);
    const add = el('button', 'primaryBtn', 'Add to library');
    add.addEventListener('click', async () => {
      const song = {
        id: 'u' + Date.now(),
        title: titleIn.value.trim() || 'Untitled score',
        composer: 'Your library',
        events: parsed.events, bpmHint: parsed.bpmHint, custom: true,
      };
      G.songs.push(song);
      await store.set('cadenza:songs', G.songs.filter(s => s.custom).map(s => ({ id: s.id, title: s.title, composer: s.composer, events: s.events, bpmHint: s.bpmHint, custom: true })));
      closeModal();
      renderSongs();
      toast('\u201C' + song.title + '\u201D joined the programme.');
    });
    wrap.appendChild(add);
    openModal(wrap);
  }

  $('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
    e.target.value = '';
  });
  const sel = $('screen-select');
  sel.addEventListener('dragover', e => { e.preventDefault(); sel.classList.add('dragging'); });
  sel.addEventListener('dragleave', e => { if (e.target === sel) sel.classList.remove('dragging'); });
  sel.addEventListener('drop', e => {
    e.preventDefault(); sel.classList.remove('dragging');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  /* ---------- settings ---------- */
  const speedIn = $('speedRange'), volIn = $('volRange'), hitIn = $('hitToggle');
  function applySettings() {
    speedIn.value = G.settings.speed;
    volIn.value = Math.round(G.settings.volume * 100);
    hitIn.checked = G.settings.hitSound;
    $('speedVal').textContent = G.settings.speed;
    Sound.setVolume(G.settings.volume);
  }
  async function saveSettings() { await store.set('cadenza:settings', G.settings); }
  speedIn.addEventListener('input', () => { G.settings.speed = +speedIn.value; $('speedVal').textContent = speedIn.value; saveSettings(); });
  volIn.addEventListener('input', () => { G.settings.volume = volIn.value / 100; Sound.setVolume(G.settings.volume); saveSettings(); });
  hitIn.addEventListener('change', () => { G.settings.hitSound = hitIn.checked; saveSettings(); });

  /* ---------- gameplay ---------- */
  const gc = $('gameCanvas');
  const gctx = gc.getContext('2d');
  let raf = null;

  function startGame(song, diff) {
    Sound.ensure();
    Sound.stopAll();
    const chart = buildChart(song.events, diff, song.bpmHint);
    if (!chart.length) { toast('That chart came out empty \u2014 try another difficulty.', true); return; }
    const notes = chart.map((n, i) => ({ ...n, i, state: 0 })); // 0 pending, 1 holding, 2 missed, 3 done
    // imps are tuned to the chart: every hold sends a heavyweight, dense
    // streams send a swarm, and a few other notes send a stray — each one
    // scurries in from the page edge and only dies when its note is played
    const rideProb = { easy: 5, normal: 10, hard: 14, virtuoso: 18 }[diff] || 10;
    for (const n of notes) {
      if (!n.hold) continue;
      const dur = n.tailT - n.t;
      n.imp = dur >= 0.9 ? { s: 2.7, hp: 3 } : { s: 2.1, hp: 2 };
    }
    let runStart = 0;
    for (let i = 1; i <= notes.length; i++) {
      if (i === notes.length || notes[i].t - notes[i - 1].t > 0.22) {
        if (i - runStart >= 5) for (let j = runStart; j < i; j++) notes[j].imp = notes[j].imp || { s: 1.05, hp: 1 };
        runStart = i;
      }
    }
    for (const n of notes) {
      if (!n.imp && ((n.i * 2654435761) >>> 0) % 100 < rideProb) n.imp = { s: 1.5, hp: 1 };
    }
    const totalUnits = notes.reduce((s, n) => s + (n.hold ? 2 : 1), 0);
    const maxTail = notes.reduce((m, n) => Math.max(m, n.hold ? n.tailT : n.t), 0);
    const laneQ = [[], [], [], []];
    for (const n of notes) laneQ[n.lane].push(n);
    const lanePtr = [0, 0, 0, 0];
    const endT = Math.max(song.events[song.events.length - 1].t + (song.events[song.events.length - 1].dur || 0), maxTail) + 1.6;
    // a flawless run is deterministic (combo climbs 1..totalUnits), so
    // normalizing by its multiplier-weighted sum pins the max score to 1M
    let maxWeighted = 0;
    for (let u = 1; u <= totalUnits; u++) maxWeighted += multFor(u);

    G.run = {
      song, diff, notes, laneQ, lanePtr,
      audioIdx: 0, endT,
      startCtxTime: Sound.ctx.currentTime + 3.2,
      leadIn: 3.2, lastCount: 4,
      score: 0, combo: 0, maxCombo: 0,
      counts: { perfect: 0, great: 0, good: 0, miss: 0 },
      judged: 0, weightSum: 0,
      pxPerSec: 240 + G.settings.speed * 60,
      pops: [], flashes: [0, 0, 0, 0], particles: [],
      held: [false, false, false, false],
      earlyLate: { early: 0, late: 0 },
      paused: false, done: false, failed: false, base: 1000000 / maxWeighted,
      life: 100,
      activeHolds: [null, null, null, null],
      mult: 1, fever: false, milestonesHit: {}, announce: null, shock: null,
      imps: [], projectiles: [], impsSwatted: 0, impsEscaped: 0, impIdx: 0,
      glyphT: 0, lastFrameMs: performance.now(),
    };
    $('pauseMenu').classList.remove('open');
    $('gLife').style.width = '100%';
    $('gLife').classList.remove('low');
    $('gSong').textContent = song.title;
    $('gDiff').textContent = DIFF_CONFIG[diff].label;
    show('game');
    sizeGame();
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(gameFrame);
  }

  function sizeGame() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    gc.width = gc.clientWidth * dpr;
    gc.height = gc.clientHeight * dpr;
    gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', () => { if (G.screen === 'game') sizeGame(); });

  function pos() {
    const r = G.run;
    return Sound.ctx.currentTime - r.startCtxTime;
  }

  function judge(lane) {
    const r = G.run;
    if (!r || r.paused || r.done) return;
    const t = pos();
    r.flashes[lane] = 1;
    if (G.settings.hitSound) Sound.hitTick();
    const q = r.laneQ[lane];
    let best = null, bestAbs = Infinity;
    for (let i = r.lanePtr[lane]; i < q.length; i++) {
      const n = q[i];
      if (n.state !== 0) continue;
      const d = t - n.t;
      if (d < -JUDGE.good) break;
      const ad = Math.abs(d);
      if (ad <= JUDGE.good && ad < bestAbs) { best = n; bestAbs = ad; }
    }
    if (!best) return; // ghost tap — no penalty
    const d = t - best.t;
    const ad = Math.abs(d);
    const kind = ad <= JUDGE.perfect ? 'perfect' : ad <= JUDGE.great ? 'great' : 'good';
    if (best.hold) { best.state = 1; r.activeHolds[lane] = best; }
    else best.state = 3;
    registerHit(kind, lane, d, best.hold ? null : best); // hold escorts die at the tail
  }

  const LIFE_REGEN = { perfect: 0.8, great: 0.5, good: 0.2 };
  function healLife(amt) {
    const r = G.run;
    if (r) r.life = Math.min(100, r.life + amt);
  }
  function drainLife(amt) {
    const r = G.run;
    if (!r || r.done || r.failed) return;
    r.life = Math.max(0, r.life - amt);
    if (r.life <= 0) r.failed = true; // gameFrame ends the run at the frame boundary
  }

  function registerHit(kind, lane, off, note) {
    const r = G.run;
    r.counts[kind]++;
    r.judged++;
    r.weightSum += JUDGE_WEIGHT[kind];
    healLife(LIFE_REGEN[kind] || 0);
    r.combo++;
    if (r.combo > r.maxCombo) r.maxCombo = r.combo;
    r.mult = multFor(r.combo);
    r.score += r.base * JUDGE_WEIGHT[kind] * r.mult;
    const wasFever = r.fever;
    r.fever = r.combo >= 25;
    if (r.fever && !wasFever) {
      r.announce = { text: 'Crescendo!', t: performance.now() };
      for (const imp of r.imps) if (imp.state === 'gnaw') imp.state = 'flee';
    }
    if (MILESTONES.includes(r.combo) && !r.milestonesHit[r.combo]) {
      r.milestonesHit[r.combo] = 1;
      r.shock = { rad: 12, life: 1 };
    }
    if (kind !== 'perfect' && off !== 0) { if (off < 0) r.earlyLate.early++; else r.earlyLate.late++; }
    r.pops.push({ t: performance.now(), kind, lane, off });
    const w = playW(), lw = w / 4, x0 = (gc.clientWidth - w) / 2;
    spawnInk(x0 + lane * lw + lw / 2, hitY(), kind);
    if (!killEscort(note)) fireProjectile(x0 + lane * lw + lw / 2, kind);
  }

  function releaseLane(lane) {
    const r = G.run;
    if (!r || r.done || r.paused) return;
    const h = r.activeHolds[lane];
    if (!h) return;
    r.activeHolds[lane] = null;
    const t = pos();
    if (t >= h.tailT - 0.15) { h.state = 3; registerHit('perfect', lane, 0, h); }
    else {
      h.state = 2;
      r.judged++; r.counts.miss++;
      r.combo = 0; r.mult = 1; r.fever = false;
      drainLife(13);
      r.pops.push({ t: performance.now(), kind: 'drop', lane, off: 0 });
      startGnaw(h.escort); // the heavyweight settles in to feed
    }
  }

  function spawnInk(x, y, kind) {
    const r = G.run;
    r.particles.push({ type: 'ring', x, y, rad: 8, vr: kind === 'perfect' ? 260 : 190, life: 1, red: kind === 'perfect' });
    const drops = kind === 'perfect' ? 7 : 4;
    for (let i = 0; i < drops; i++) {
      const a = -Math.PI / 2 + (Math.random() - 0.5) * 2.2, v = Math.random() * 130 + 50;
      r.particles.push({ type: 'drop', x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 1, red: kind === 'perfect' && Math.random() < 0.5 });
    }
    if (r.particles.length > 200) r.particles.splice(0, r.particles.length - 200);
  }

  function playW() { return Math.min(480, gc.clientWidth * 0.96); }
  function hitY() { return gc.clientHeight - clamp(gc.clientHeight * 0.16, 90, 150); }

  function gameFrame() {
    const r = G.run;
    if (!r) return;
    const nowMs = performance.now();
    const dtR = clamp((nowMs - (r.lastFrameMs || nowMs)) / 1000, 0, 1 / 30);
    r.lastFrameMs = nowMs;
    if (!r.paused) {
      const t = pos();

      // countdown ticks
      if (t < 0) {
        const c = Math.ceil(-t);
        if (c < r.lastCount && c >= 1) { r.lastCount = c; Sound.countTick(false); }
      } else if (r.lastCount !== 0) { r.lastCount = 0; Sound.countTick(true); }

      // schedule audio (full song, unfiltered)
      const evs = r.song.events;
      while (r.audioIdx < evs.length && evs[r.audioIdx].t <= t + 0.8) {
        const e = evs[r.audioIdx];
        Sound.playTone(e.midi, r.startCtxTime + e.t, e.dur, e.vel != null ? 0.35 + e.vel * 0.6 : 0.75);
        r.audioIdx++;
      }

      // miss sweep
      for (let l = 0; l < 4; l++) {
        const q = r.laneQ[l];
        while (r.lanePtr[l] < q.length) {
          const n = q[r.lanePtr[l]];
          if (n.state === 0 && t - n.t > JUDGE.good) {
            n.state = 2;
            const units = n.hold ? 2 : 1;
            r.counts.miss += units; r.judged += units;
            r.combo = 0; r.mult = 1; r.fever = false;
            drainLife(13);
            startGnaw(n.escort); // its imp stays and starts gnawing
            r.pops.push({ t: performance.now(), kind: 'miss', lane: l, off: 0 });
            r.lanePtr[l]++;
          } else if (n.state !== 0) {
            r.lanePtr[l]++;
          } else break;
        }
      }

      for (let l = 0; l < 4; l++) {
        const h = r.activeHolds[l];
        if (h && t > h.tailT) { r.activeHolds[l] = null; h.state = 3; registerHit('perfect', l, 0, h); }
      }

      updateImps(dtR, t);
      drawGame(t);

      if (!r.outro && (r.failed || t > r.endT)) {
        r.done = true;
        r.outro = { type: r.failed ? 'fail' : 'clear', t0: performance.now(), dur: r.failed ? 1000 : 1700 };
        if (r.failed) {
          Sound.stopAll();
          const now = Sound.ctx.currentTime; // a low, sour curtain sting
          for (const m of [26, 27, 32]) Sound.playTone(m, now + 0.02, 1.6, 0.85);
        }
      }
      if (r.outro) {
        drawCurtains(Math.min(1, (performance.now() - r.outro.t0) / r.outro.dur), r.outro.type);
        if (performance.now() - r.outro.t0 > r.outro.dur + 700) { finishGame(); return; }
      }
    }
    raf = requestAnimationFrame(gameFrame);
  }

  /* ---------- the marginalia imps ---------- */
  function multFor(c) { return c >= 50 ? 1.5 : c >= 25 ? 1.25 : c >= 10 ? 1.1 : 1; }
  const MILESTONES = [10, 25, 50, 100, 150, 200, 250, 300, 400, 500];

  function laneX(lane) {
    const w = playW(), lw = w / 4;
    return (gc.clientWidth - w) / 2 + lane * lw + lw / 2;
  }

  // imps live in the page margins, never inside the printed system:
  // a hard wall at the playfield edge keeps them off the staff
  function marginWall(side) {
    const w = playW(), x0 = (gc.clientWidth - w) / 2;
    return side < 0 ? Math.max(24, x0 - 16) : Math.min(gc.clientWidth - 24, x0 + w + 16);
  }
  function clampMargin(imp) {
    if (!imp.side) return;
    if (imp.side < 0) imp.x = clamp(imp.x, 10, marginWall(-1));
    else imp.x = clamp(imp.x, marginWall(1), gc.clientWidth - 10);
  }

  // each marked note sends an escort imp along the page margin, timed to
  // arrive beside its lane just as the note reaches the barline
  function spawnEscort(n, t) {
    const r = G.run;
    if (r.imps.filter(i => i.state === 'come' || i.state === 'menace').length >= 16) return;
    const side = n.lane < 2 ? -1 : 1; // outer lanes' side of the page
    const wall = marginWall(side);
    const hx = clamp(wall - side * Math.random() * 60, 10, gc.clientWidth - 10);
    const hy = clamp(hitY() - 26 + Math.random() * 70, 60, gc.clientHeight - 26);
    const imp = {
      x: side < 0 ? -30 : gc.clientWidth + 30,
      y: clamp(hy + (Math.random() - 0.5) * 120, 60, gc.clientHeight - 26),
      hx, hy, side, vx: 0, s: n.imp.s, hp: n.imp.hp, hitT: 0,
      drunk: 0, fill: 4 + 3 * n.imp.hp,
      speed: 70, // set below once the walk distance is known
      phase: Math.random() * 10, variant: Math.floor(Math.random() * 3),
      color: IMP_COLORS[Math.floor(Math.random() * IMP_COLORS.length)],
      state: 'come', st: 0, blot: null,
    };
    imp.speed = clamp(Math.hypot(hx - imp.x, hy - imp.y) / Math.max(0.4, n.t - t + 0.15), 70, 460);
    n.escort = imp;
    r.imps.push(imp);
  }

  // playing the note dispatches its escort: a glyph flies out and splats it
  function killEscort(n) {
    const r = G.run;
    const imp = n && n.escort;
    if (!imp || imp.state === 'splat' || imp.state === 'gone' || imp.doomed) return false;
    imp.doomed = true;
    r.projectiles.push({ x: laneX(n.lane), y: hitY() + 6, target: imp, sure: true, red: imp.s > 2, rot: Math.random() * 6 });
    return true;
  }

  // a missed note's escort stays and gnaws the page, bleeding ink
  // until it is splatted or has eaten its fill
  function startGnaw(imp) {
    if (!imp || (imp.state !== 'come' && imp.state !== 'menace')) return;
    imp.state = 'gnaw'; imp.st = 0;
  }

  function splatImp(imp) {
    const r = G.run;
    if (imp.state === 'splat' || imp.state === 'gone') return;
    imp.state = 'splat'; imp.st = 0;
    imp.blot = [];
    for (let i = 0; i < 6; i++) imp.blot.push({ dx: (Math.random() - 0.5) * 26 * imp.s, dy: (Math.random() - 0.5) * 16 * imp.s, r: (2 + Math.random() * 5) * imp.s });
    healLife(1 + imp.s + imp.drunk * 0.6); r.impsSwatted++; // splashes back most of what it stole
    r.pops.push({ t: performance.now(), kind: 'swat', lane: -1, x: imp.x, y: imp.y - 30 * imp.s, off: 0 });
  }

  function damageImp(imp, fx, fy) {
    const r = G.run;
    if (imp.state === 'splat' || imp.state === 'gone') return;
    imp.hp--;
    if (imp.hp <= 0) { splatImp(imp); return; }
    imp.hitT = 0.3;
    const d = Math.hypot(imp.x - fx, imp.y - fy) || 1;
    imp.x = clamp(imp.x + (imp.x - fx) / d * 46, 16, gc.clientWidth - 16);
    imp.y = clamp(imp.y + (imp.y - fy) / d * 32, 34, gc.clientHeight - 22);
    clampMargin(imp); // knockback never shoves them onto the staff
    for (let i = 0; i < 3; i++) r.particles.push({ type: 'drop', x: imp.x, y: imp.y - 10 * imp.s, vx: (Math.random() - 0.5) * 130, vy: -60 - Math.random() * 60, life: 1, red: false });
  }

  function fireProjectile(fromX, kind) {
    const r = G.run;
    let best = null, bd = 1e9;
    for (const imp of r.imps) {
      if (imp.state !== 'gnaw' || imp.doomed) continue;
      const d = Math.abs(imp.x - fromX);
      if (d < bd) { bd = d; best = imp; }
    }
    if (!best) return;
    r.projectiles.push({ x: fromX, y: hitY() + 6, target: best, red: kind === 'perfect', rot: Math.random() * 6 });
  }

  function updateImps(dt, t) {
    const r = G.run;
    const W = gc.clientWidth, H = gc.clientHeight;
    // send in escorts for notes entering the approach window
    while (r.impIdx < r.notes.length && r.notes[r.impIdx].t - t <= 2.2) {
      const n = r.notes[r.impIdx++];
      if (n.imp && !r.done) spawnEscort(n, t);
    }
    for (let i = r.imps.length - 1; i >= 0; i--) {
      const imp = r.imps[i];
      imp.st += dt;
      if (imp.hitT > 0) imp.hitT -= dt;
      if (imp.state === 'come') {
        const d = Math.hypot(imp.hx - imp.x, imp.hy - imp.y) || 1;
        imp.vx = (imp.hx - imp.x) / d * imp.speed;
        imp.x += imp.vx * dt;
        imp.y += (imp.hy - imp.y) / d * imp.speed * dt;
        if (d < 8) { imp.state = 'menace'; imp.st = 0; imp.vx = 0; }
      } else if (imp.state === 'menace') {
        // hops in place below its note's lane, waiting for the verdict
      } else if (imp.state === 'gnaw') {
        const d = Math.hypot(imp.hx - imp.x, imp.hy - imp.y);
        if (d > 6) { // scurries back to its gnawing spot after a knockback
          imp.vx = (imp.hx - imp.x) / d * 140;
          imp.x += imp.vx * dt;
          imp.y += (imp.hy - imp.y) / d * 140 * dt;
        } else {
          imp.vx = 0;
          const bite = (1 + imp.hp) * dt; // fatter imps gnaw faster
          imp.drunk += bite;
          drainLife(bite);
          if (Math.random() < dt * 5) r.particles.push({
            type: 'drop', x: imp.x + (Math.random() - 0.5) * 10, y: imp.y - 10 * imp.s,
            vx: (Math.random() - 0.5) * 50, vy: -30 - Math.random() * 40, life: 1, red: true,
          });
          if (imp.drunk >= imp.fill) { imp.state = 'flee'; r.impsEscaped++; }
        }
      } else if (imp.state === 'flee') {
        imp.vx = (imp.x < W / 2 ? -1 : 1) * 260;
        imp.x += imp.vx * dt;
        if (imp.x < -44 || imp.x > W + 44) imp.state = 'gone';
      } else if (imp.state === 'splat' && imp.st > 0.7) imp.state = 'gone';
      if (imp.state === 'gone') r.imps.splice(i, 1);
    }
    for (let i = r.projectiles.length - 1; i >= 0; i--) {
      const p = r.projectiles[i];
      if (!p.target || p.target.state === 'splat' || p.target.state === 'gone') {
        if (p.sure) { r.projectiles.splice(i, 1); continue; } // its escort is already gone
        let best = null, bd = 1e9;
        for (const imp of r.imps) {
          if (imp.state !== 'gnaw' || imp.doomed) continue;
          const d = Math.hypot(imp.x - p.x, imp.y - p.y);
          if (d < bd) { bd = d; best = imp; }
        }
        if (!best) { r.projectiles.splice(i, 1); continue; }
        p.target = best;
      }
      const tx = p.target.x, ty = p.target.y - 12 * p.target.s;
      const d = Math.hypot(tx - p.x, ty - p.y);
      const step = 620 * dt;
      p.rot += dt * 9;
      if (d <= step + 14) {
        const hx = tx, hly = ty;
        if (p.sure) splatImp(p.target); // its note was played — it goes
        else damageImp(p.target, p.x, p.y);
        if (p.red) for (const imp of r.imps) {
          if (imp.state === 'gnaw' && Math.hypot(imp.x - hx, imp.y - hly) < 84 && imp !== p.target) damageImp(imp, hx, hly);
        }
        r.projectiles.splice(i, 1);
      } else {
        p.x += (tx - p.x) / d * step;
        p.y += (ty - p.y) / d * step;
      }
    }
    if (r.shock) {
      r.shock.rad += 1050 * dt; r.shock.life -= dt * 1.3;
      for (const imp of r.imps) {
        if (imp.state === 'gnaw' && Math.hypot(imp.x - W / 2, imp.y - hitY()) < r.shock.rad) splatImp(imp);
      }
      if (r.shock.life <= 0) r.shock = null;
    }
    if (r.fever) {
      r.glyphT -= dt;
      if (r.glyphT <= 0) {
        r.glyphT = 0.5;
        r.particles.push({ type: 'glyph', x: W / 2 + (Math.random() - 0.5) * 56, y: H - 54, vx: (Math.random() - 0.5) * 16, vy: -36, life: 1, red: Math.random() < 0.4 });
      }
    }
  }

  function circle(x, y, rad, fill, stroke) {
    gctx.beginPath(); gctx.arc(x, y, rad, 0, Math.PI * 2);
    if (fill) { gctx.fillStyle = fill; gctx.fill(); }
    if (stroke) gctx.stroke();
  }

  // the mascots: plump multicoloured doodle-imps with big eyes
  function drawImp(imp, t) {
    const col = imp.color || IMP_COLORS[0];
    if (imp.state === 'splat') {
      const a2 = Math.max(0, 1 - imp.st / 0.7);
      gctx.globalAlpha = a2 * 0.9;
      gctx.fillStyle = col;
      for (const b2 of imp.blot) { gctx.beginPath(); gctx.arc(imp.x + b2.dx, imp.y - 8 * imp.s + b2.dy, b2.r, 0, Math.PI * 2); gctx.fill(); }
      gctx.globalAlpha = 1;
      return;
    }
    const wob = Math.sin(t * 7 + imp.phase);
    const v = imp.variant;
    const menace = imp.state === 'menace', flee = imp.state === 'flee';
    const gnawing = imp.state === 'gnaw' && !imp.vx;
    const moving = Math.abs(imp.vx || 0) > 1 || imp.state === 'come';
    const hop = menace ? Math.abs(Math.sin(imp.st * 9)) * 7
      : gnawing ? Math.abs(Math.sin(imp.st * 10)) * 2.5 : 0;
    const lean = flee ? (imp.vx < 0 ? -0.25 : 0.25)
      : gnawing ? Math.sin(imp.st * 10) * 0.08
      : clamp((imp.vx || 0) / 260, -0.16, 0.16) + wob * 0.04;
    gctx.save();
    gctx.translate(imp.x, imp.y - hop * imp.s);
    gctx.scale(imp.s, imp.s);
    gctx.rotate(lean);
    gctx.strokeStyle = INK; gctx.lineWidth = 1.5; gctx.lineCap = 'round';
    // stubby feet, alternating while on the move
    const step = moving ? Math.sin(t * (flee ? 22 : 13) + imp.phase) * 2.2 : 0;
    gctx.fillStyle = col;
    gctx.beginPath(); gctx.ellipse(-4, -1.6 - Math.max(0, step), 2.5, 1.9, 0, 0, Math.PI * 2); gctx.fill(); gctx.stroke();
    gctx.beginPath(); gctx.ellipse(4, -1.6 - Math.max(0, -step), 2.5, 1.9, 0, 0, Math.PI * 2); gctx.fill(); gctx.stroke();
    // plump body, breathing softly
    gctx.beginPath(); gctx.ellipse(0, -11, 8.6 + wob * 0.25, 8.2 - wob * 0.25, 0, 0, Math.PI * 2);
    gctx.fillStyle = col; gctx.fill(); gctx.stroke();
    gctx.fillStyle = 'rgba(255,255,255,.3)';
    gctx.beginPath(); gctx.ellipse(0, -7.6, 4.6, 3.4, 0, 0, Math.PI * 2); gctx.fill();
    // headgear per variant: nub horns / curly antenna / three crown nubs
    gctx.fillStyle = col;
    if (v === 0) { circle(-4.4, -18.6, 1.9, col, true); circle(4.4, -18.6, 1.9, col, true); }
    else if (v === 1) {
      gctx.beginPath(); gctx.moveTo(0, -19); gctx.quadraticCurveTo(1.5 + wob, -24, -1 + wob, -25.5); gctx.stroke();
      circle(-1 + wob, -25.5, 1.7, col, true);
    } else { circle(-5, -18.2, 1.6, col, true); circle(0, -19.4, 1.6, col, true); circle(5, -18.2, 1.6, col, true); }
    // arms: the third kind has little crab pincers
    if (v === 2) {
      for (const sd of [-1, 1]) {
        circle(sd * 11.2, -12 + wob * 0.5, 3, col, true);
        gctx.fillStyle = PAPER;
        gctx.beginPath(); gctx.moveTo(sd * 11.2, -12 + wob * 0.5);
        gctx.lineTo(sd * 14.6, -14.4 + wob * 0.5); gctx.lineTo(sd * 14.6, -9.6 + wob * 0.5);
        gctx.closePath(); gctx.fill();
        gctx.fillStyle = col;
      }
    } else {
      const up = menace ? -1 : 1; // arms thrown up while menacing
      gctx.beginPath(); gctx.moveTo(-8.2, -12); gctx.lineTo(-11, -12 + up * 3.6); gctx.stroke();
      gctx.beginPath(); gctx.moveTo(8.2, -12); gctx.lineTo(11, -12 + up * 3.6); gctx.stroke();
    }
    // face
    if (gnawing) { // blissful closed eyes while munching
      gctx.lineWidth = 1.3;
      gctx.beginPath(); gctx.arc(-3.1, -13.2, 1.8, Math.PI, 0); gctx.stroke();
      gctx.beginPath(); gctx.arc(3.1, -13.2, 1.8, Math.PI, 0); gctx.stroke();
    } else {
      gctx.lineWidth = 1;
      circle(-3.1, -13, 2.6, '#fff', true);
      circle(3.1, -13, 2.6, '#fff', true);
      const px = flee ? (imp.vx < 0 ? -0.9 : 0.9) : clamp((imp.vx || 0) / 200, -0.9, 0.9) + wob * 0.25;
      const py = menace ? -0.5 : 0.35;
      circle(-3.1 + px, -13 + py, menace ? 1.4 : 1.15, INK, false);
      circle(3.1 + px, -13 + py, menace ? 1.4 : 1.15, INK, false);
    }
    gctx.fillStyle = 'rgba(224,110,110,.38)';
    circle(-5.7, -9.8, 1.5, 'rgba(224,110,110,.38)', false);
    circle(5.7, -9.8, 1.5, 'rgba(224,110,110,.38)', false);
    // mouth
    gctx.lineWidth = 1.2; gctx.strokeStyle = INK;
    if (gnawing) {
      const open = Math.abs(Math.sin(imp.st * 10)) * 1.6 + 0.5;
      gctx.beginPath(); gctx.ellipse(0, -8.6, 1.9, open, 0, 0, Math.PI * 2); gctx.fillStyle = INK; gctx.fill();
    } else if (menace) { // gleeful open grin with one fang
      gctx.beginPath(); gctx.arc(0, -9.8, 2.3, 0, Math.PI); gctx.fillStyle = INK; gctx.fill();
      gctx.fillStyle = '#fff';
      gctx.beginPath(); gctx.moveTo(1, -9.8); gctx.lineTo(2.1, -9.8); gctx.lineTo(1.55, -8.6); gctx.closePath(); gctx.fill();
    } else if (flee) {
      gctx.beginPath(); gctx.arc(0, -9.2, 1, 0, Math.PI * 2); gctx.stroke();
      circle(-8.4, -18, 1.2, 'rgba(120,170,205,.9)', false); // sweat bead
    } else {
      gctx.beginPath(); gctx.arc(0, -10.2, 2, Math.PI * 0.15, Math.PI * 0.85); gctx.stroke();
    }
    if (imp.hitT > 0) {
      gctx.strokeStyle = ACCENT; gctx.lineWidth = 1.2;
      gctx.beginPath(); gctx.ellipse(0, -11, 12, 11, 0, 0, Math.PI * 2); gctx.stroke();
    }
    gctx.restore();
  }

  // stage curtains sweep in over the page at the end of a run —
  // a graceful draw on a clear, a slam on a fail
  function drawCurtains(p, type) {
    const W = gc.clientWidth, H = gc.clientHeight;
    const ease = type === 'fail' ? p * p : p * p * (3 - 2 * p);
    const cw = (W / 2 + 26) * ease;
    if (cw <= 0) return;
    const tNow = performance.now() / 1000;
    for (const sd of [-1, 1]) {
      gctx.save();
      if (sd > 0) { gctx.translate(W, 0); gctx.scale(-1, 1); }
      // panel with a softly scalloped leading edge
      gctx.beginPath();
      gctx.moveTo(-26, -4); gctx.lineTo(-26, H + 4);
      const bulges = Math.max(3, Math.round(H / 150));
      for (let i = bulges; i >= 0; i--) {
        const y = (i / bulges) * H;
        const y2 = ((i - 0.5) / bulges) * H;
        if (i === bulges) gctx.lineTo(cw - 26, y);
        else gctx.quadraticCurveTo(cw - 8 + Math.sin(tNow * 2 + i) * 3, y2, cw - 26 + (i % 2) * 8, y);
      }
      gctx.closePath();
      gctx.fillStyle = '#7c2622'; gctx.fill();
      gctx.save();
      gctx.clip();
      gctx.fillStyle = 'rgba(35,15,12,.28)'; // velvet folds
      for (let x = -18; x < cw; x += 30) {
        gctx.beginPath();
        gctx.moveTo(x, -4);
        gctx.quadraticCurveTo(x + 9 + Math.sin(tNow * 1.7 + x) * 4, H / 2, x, H + 4);
        gctx.lineTo(x + 12, H + 4);
        gctx.quadraticCurveTo(x + 21 + Math.sin(tNow * 1.7 + x) * 4, H / 2, x + 12, -4);
        gctx.closePath(); gctx.fill();
      }
      gctx.restore();
      gctx.strokeStyle = '#c9a04c'; gctx.lineWidth = 2.5; // gold trim
      gctx.stroke();
      gctx.restore();
    }
    // valance swag across the top
    gctx.fillStyle = '#5f1c19';
    gctx.beginPath();
    gctx.moveTo(0, 0); gctx.lineTo(W, 0);
    const swags = Math.max(3, Math.round(W / 220));
    for (let i = swags; i >= 0; i--) gctx.quadraticCurveTo(((i + 0.5) / swags) * W, 46 * Math.min(1, p * 2.5), (i / swags) * W, 16 * Math.min(1, p * 2.5));
    gctx.closePath(); gctx.fill();
    // the closing line, once the curtains meet
    if (p >= 1) {
      gctx.globalAlpha = 0.95;
      gctx.fillStyle = PAPER;
      gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
      gctx.font = 'italic 600 30px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText(type === 'fail' ? 'the curtain falls…' : 'fine.', W / 2, H * 0.44);
      gctx.font = 'italic 15px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillStyle = '#c9a04c';
      gctx.fillText(type === 'fail' ? 'the imps take the page' : 'the recital concludes', W / 2, H * 0.44 + 34);
      gctx.globalAlpha = 1;
    }
  }

  function line(a, b, c, d) { gctx.beginPath(); gctx.moveTo(a, b); gctx.lineTo(c, d); gctx.stroke(); }

  function notehead(cx, cy, mode) {
    // mode: 'fill' (pending note), 'hollow' (missed), 'receptor', 'pressed'
    gctx.save();
    gctx.translate(cx, cy);
    gctx.rotate(-0.32);
    gctx.beginPath();
    gctx.ellipse(0, 0, 11, 8, 0, 0, Math.PI * 2);
    if (mode === 'fill' || mode === 'pressed') {
      gctx.strokeStyle = PAPER; gctx.lineWidth = 4;
      gctx.stroke();
      gctx.fillStyle = mode === 'pressed' ? inkA(0.9) : INK;
      gctx.fill();
    } else if (mode === 'holdHead' || mode === 'holdActive') {
      gctx.fillStyle = PAPER; gctx.fill();
      gctx.strokeStyle = mode === 'holdActive' ? ACCENT : INK;
      gctx.lineWidth = 2.2;
      gctx.stroke();
    } else {
      gctx.strokeStyle = mode === 'receptor' ? inkA(0.28) : inkA(0.5);
      gctx.lineWidth = 1.6;
      gctx.stroke();
    }
    gctx.restore();
    if (mode === 'fill') {
      gctx.strokeStyle = PAPER; gctx.lineWidth = 4;
      line(cx + 10, cy - 4, cx + 10, cy - 36);
      gctx.strokeStyle = INK; gctx.lineWidth = 1.6;
      line(cx + 10, cy - 4, cx + 10, cy - 36);
    }
  }

  function drawGame(t) {
    const r = G.run;
    const W = gc.clientWidth, H = gc.clientHeight;
    gctx.clearRect(0, 0, W, H);
    const w = playW(), lw = w / 4, x0 = (W - w) / 2, hy = hitY();

    // system margins + faint lane separators
    gctx.lineWidth = 1;
    gctx.strokeStyle = r.fever ? accA(0.6) : inkA(0.4);
    line(x0, 0, x0, H); line(x0 + w, 0, x0 + w, H);
    if (r.fever) { line(x0 - 4, 0, x0 - 4, H); line(x0 + w + 4, 0, x0 + w + 4, H); }
    gctx.strokeStyle = inkA(0.08);
    for (let i = 1; i < 4; i++) line(x0 + i * lw, 0, x0 + i * lw, H);

    // beat rules — every 4th (barline) drawn heavier
    const spb = 60 / (r.song.bpmHint || 120);
    const startB = Math.max(0, Math.floor((t - (H - hy) / r.pxPerSec) / spb) - 1);
    const endB = Math.ceil((t + hy / r.pxPerSec) / spb) + 1;
    for (let bi = startB; bi <= endB; bi++) {
      const y = hy - (bi * spb - t) * r.pxPerSec;
      if (y < -10 || y > H + 10) continue;
      gctx.strokeStyle = inkA(bi % 4 === 0 ? 0.14 : 0.05);
      line(x0, y, x0 + w, y);
    }

    // lane press wash
    for (let l = 0; l < 4; l++) {
      if (r.flashes[l] > 0.02) {
        gctx.fillStyle = inkA(0.045 * r.flashes[l]);
        gctx.fillRect(x0 + l * lw + 1, 0, lw - 2, hy);
        r.flashes[l] *= 0.87;
      }
    }

    // final barline (thin + thick) just below the receptor row
    gctx.strokeStyle = inkA(0.92);
    gctx.lineWidth = 1.5; line(x0 - 12, hy + 14, x0 + w + 12, hy + 14);
    gctx.lineWidth = 5;   line(x0 - 12, hy + 21, x0 + w + 12, hy + 21);
    gctx.lineWidth = 1;

    // receptors + key labels
    gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
    for (let l = 0; l < 4; l++) {
      const cx = x0 + l * lw + lw / 2;
      notehead(cx, hy, r.held[l] ? 'pressed' : 'receptor');
      gctx.fillStyle = inkA(0.35);
      gctx.font = '12px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText(LANE_KEYS[l].toUpperCase(), cx, hy + 42);
    }

    // — the pianist and the marginalia imps —
    for (const imp of r.imps) drawImp(imp, Math.max(0, t));
    gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
    for (const p of r.projectiles) {
      gctx.save(); gctx.translate(p.x, p.y); gctx.rotate(p.rot);
      gctx.fillStyle = p.red ? ACCENT : INK;
      gctx.font = '16px Georgia, serif';
      gctx.fillText('\u266A', 0, 0);
      gctx.restore();
    }
    if (r.shock) {
      gctx.strokeStyle = accA(Math.max(0, r.shock.life) * 0.6);
      gctx.lineWidth = 2 + r.shock.life * 2;
      gctx.beginPath(); gctx.arc(W / 2, H - 30, r.shock.rad, 0, Math.PI * 2); gctx.stroke();
      gctx.lineWidth = 1;
    }


    // notes — engraved quarter noteheads with stems; missed become hollow
    const lookahead = (hy + 80) / r.pxPerSec;
    for (const n of r.notes) {
      if (n.state === 3) continue;
      const dt = n.t - t;
      if (dt > lookahead) break;
      const cx = x0 + n.lane * lw + lw / 2;
      if (n.hold) {
        const holding = n.state === 1;
        const headY = holding ? hy : hy - dt * r.pxPerSec;
        const tailY = hy - (n.tailT - t) * r.pxPerSec;
        if (headY < -60 && tailY < -60) continue;
        const dead = n.state === 2;
        // sustain rail
        gctx.strokeStyle = PAPER; gctx.lineWidth = 12;
        line(cx, headY, cx, tailY);
        gctx.strokeStyle = dead ? inkA(0.08) : holding ? accA(0.35) : inkA(0.16);
        gctx.lineWidth = 9;
        line(cx, headY, cx, tailY);
        gctx.strokeStyle = dead ? inkA(0.2) : holding ? ACCENT : inkA(0.65);
        gctx.lineWidth = 1.3;
        line(cx - 5, headY, cx - 5, tailY);
        line(cx + 5, headY, cx + 5, tailY);
        // tail cap: small hollow head
        gctx.save(); gctx.translate(cx, tailY); gctx.scale(0.65, 0.65); gctx.translate(-cx, -tailY);
        if (dead) gctx.globalAlpha = 0.3;
        notehead(cx, tailY, 'holdHead');
        gctx.restore(); gctx.globalAlpha = 1;
        // head: half-note style
        if (dead) { gctx.globalAlpha = 0.3; notehead(cx, headY, 'holdHead'); gctx.globalAlpha = 1; }
        else notehead(cx, headY, holding ? 'holdActive' : 'holdHead');
        if (holding && Math.random() < 0.3) {
          r.particles.push({ type: 'drop', x: cx + (Math.random() - 0.5) * 16, y: hy - 6, vx: (Math.random() - 0.5) * 40, vy: -70 - Math.random() * 50, life: 0.7, red: true });
        }
      } else {
        const y = hy - dt * r.pxPerSec;
        if (y < -50) continue;
        if (n.state === 2) {
          gctx.globalAlpha = 0.3;
          notehead(cx, y, 'hollow');
          gctx.globalAlpha = 1;
        } else {
          notehead(cx, y, 'fill');
        }
      }
    }

    // ink effects
    const dtf = 1 / 60;
    for (let i = r.particles.length - 1; i >= 0; i--) {
      const p = r.particles[i];
      p.life -= dtf * (p.type === 'ring' ? 2.4 : p.type === 'glyph' ? 0.9 : 1.9);
      if (p.life <= 0) { r.particles.splice(i, 1); continue; }
      if (p.type === 'ring') {
        p.rad += p.vr * dtf;
        gctx.strokeStyle = p.red ? accA(p.life * 0.55) : inkA(p.life * 0.4);
        gctx.lineWidth = 1 + p.life * 1.6;
        gctx.beginPath(); gctx.arc(p.x, p.y, p.rad, 0, Math.PI * 2); gctx.stroke();
        gctx.lineWidth = 1;
      } else if (p.type === 'glyph') {
        p.x += p.vx * dtf; p.y += p.vy * dtf;
        gctx.fillStyle = p.red ? accA(p.life * 0.8) : inkA(p.life * 0.7);
        gctx.font = '13px Georgia, serif';
        gctx.textAlign = 'center';
        gctx.fillText('\u266A', p.x, p.y);
      } else {
        p.x += p.vx * dtf; p.y += p.vy * dtf; p.vy += 420 * dtf;
        gctx.fillStyle = p.red ? accA(p.life * 0.7) : inkA(p.life * 0.6);
        gctx.beginPath(); gctx.arc(p.x, p.y, 1.2 + p.life * 1.4, 0, Math.PI * 2); gctx.fill();
      }
    }

    // judgement marks — printed italic
    const nowMs = performance.now();
    for (let i = r.pops.length - 1; i >= 0; i--) {
      const p = r.pops[i];
      const age = (nowMs - p.t) / 600;
      if (age > 1) { r.pops.splice(i, 1); continue; }
      const cx = p.lane >= 0 ? x0 + p.lane * lw + lw / 2 : p.x;
      const y = p.lane >= 0 ? hy - 64 - age * 22 : p.y - age * 20;
      gctx.globalAlpha = 1 - age;
      const style = {
        perfect: [ACCENT, 'Perfect'], great: [inkA(0.85), 'Great'],
        good: [inkA(0.6), 'Good'], miss: [inkA(0.4), 'Miss'],
        swat: [ACCENT, 'Splat!'],
        drop: [inkA(0.5), 'Dropped'],
      }[p.kind];
      gctx.fillStyle = style[0];
      gctx.font = p.kind === 'swat' ? 'italic 600 12px Palatino, "Book Antiqua", Georgia, serif'
        : 'italic 600 16px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText(style[1], cx, y);
      if ((p.kind === 'great' || p.kind === 'good') && p.off !== 0) {
        gctx.font = 'italic 11px Palatino, "Book Antiqua", Georgia, serif';
        gctx.fillStyle = inkA(0.45);
        gctx.fillText(p.off < 0 ? 'early' : 'late', cx, y + 16);
      }
    }
    gctx.globalAlpha = 1;

    // combo — engraved numeral
    if (r.combo >= 4) {
      gctx.fillStyle = inkA(0.9);
      gctx.font = '600 46px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText(r.combo, W / 2, H * 0.26);
      gctx.font = 'italic 13px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillStyle = inkA(0.45);
      gctx.fillText('combo', W / 2, H * 0.26 + 28);
    }
    if (r.mult > 1) {
      gctx.fillStyle = r.fever ? ACCENT : inkA(0.6);
      gctx.font = 'italic 600 15px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText('\u00D7' + String(r.mult).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, ''), W / 2, H * 0.26 + 52);
    }
    if (r.announce) {
      const age = (performance.now() - r.announce.t) / 1100;
      if (age > 1) r.announce = null;
      else {
        gctx.globalAlpha = age < 0.15 ? age / 0.15 : Math.max(0, 1 - Math.max(0, age - 0.5) * 2);
        gctx.fillStyle = ACCENT;
        gctx.font = 'italic 600 30px Palatino, "Book Antiqua", Georgia, serif';
        gctx.fillText(r.announce.text, W / 2, H * 0.17);
        gctx.globalAlpha = 1;
      }
    }

    // countdown — printed page wash
    if (t < 0) {
      gctx.fillStyle = 'rgba(242,236,221,0.6)';
      gctx.fillRect(0, 0, W, H);
      gctx.fillStyle = INK;
      gctx.font = '600 92px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillText(Math.ceil(-t), W / 2, H * 0.4);
      gctx.font = '14px Palatino, "Book Antiqua", Georgia, serif';
      gctx.fillStyle = ACCENT;
      gctx.fillText(r.song.title, W / 2, H * 0.4 + 58);
    }

    // HUD
    const acc = r.judged ? r.weightSum / r.judged : 1;
    $('gScore').textContent = String(Math.min(1000000, Math.round(r.score))).padStart(7, '0');
    $('gAcc').textContent = (acc * 100).toFixed(2) + '%';
    const prog = clamp(t / r.endT, 0, 1);
    $('gProgress').style.width = (prog * 100) + '%';
    $('gLife').style.width = r.life + '%';
    $('gLife').classList.toggle('low', r.life <= 30);
  }

  function hexA(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  function rounded(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  /* ---------- pause ---------- */
  function togglePause() {
    const r = G.run;
    if (!r || r.done) return;
    r.paused = !r.paused;
    $('pauseMenu').classList.toggle('open', r.paused);
    if (r.paused) Sound.ctx.suspend(); else Sound.ctx.resume();
  }
  $('pauseBtn').addEventListener('click', togglePause);
  $('resumeBtn').addEventListener('click', togglePause);
  $('restartBtn').addEventListener('click', () => {
    const r = G.run;
    Sound.ctx.resume();
    Sound.stopAll();
    startGame(r.song, r.diff);
  });
  $('quitBtn').addEventListener('click', () => {
    Sound.ctx.resume();
    Sound.stopAll();
    G.run = null;
    if (raf) cancelAnimationFrame(raf);
    show('select');
    renderSongs();
  });

  /* ---------- results ---------- */
  async function finishGame() {
    const r = G.run;
    // resolve stragglers: pending notes miss; live holds complete
    for (let l = 0; l < 4; l++) {
      const h = r.activeHolds[l];
      if (h) {
        r.activeHolds[l] = null; h.state = 3;
        if (h.escort && h.escort.state !== 'splat' && h.escort.state !== 'gone') { r.impsSwatted++; h.escort.state = 'gone'; }
        r.judged++; r.weightSum += 1; r.counts.perfect++;
        r.combo++; if (r.combo > r.maxCombo) r.maxCombo = r.combo;
        r.mult = multFor(r.combo);
        r.score += r.base * r.mult;
      }
    }
    for (const n of r.notes) if (n.state === 0) { n.state = 2; const u = n.hold ? 2 : 1; r.counts.miss += u; r.judged += u; }
    const acc = r.judged ? r.weightSum / r.judged : 0;
    const [, grade, flavor] = r.failed ? [0, 'F', 'The imps win this page — the curtain falls early.'] : gradeFor(acc);
    const score = Math.min(1000000, Math.round(r.score));
    const key = r.song.id + '|' + r.diff;
    const prev = G.scores[key];
    const isBest = !r.failed && (!prev || acc > prev.acc);
    if (isBest) {
      G.scores[key] = { score, acc, grade, combo: r.maxCombo, fc: r.counts.miss === 0 || (prev && prev.fc) || false };
      await store.set('cadenza:scores', G.scores);
    }
    $('rGrade').textContent = grade;
    $('rGrade').className = 'grade-' + grade;
    $('rFlavor').textContent = flavor;
    $('rSong').textContent = r.song.title + ' \u2014 ' + DIFF_CONFIG[r.diff].label;
    $('rScore').textContent = String(score).padStart(7, '0');
    $('rAcc').textContent = (acc * 100).toFixed(2) + '%';
    $('rCombo').textContent = r.maxCombo + 'x';
    $('rPerfect').textContent = r.counts.perfect;
    $('rGreat').textContent = r.counts.great;
    $('rGood').textContent = r.counts.good;
    $('rMiss').textContent = r.counts.miss;
    $('rImps').textContent = r.impsSwatted;
    $('rFC').style.display = r.counts.miss === 0 ? 'inline-block' : 'none';
    try {
      const life = ((await store.get('cadenza:imps', 0)) || 0) + r.impsSwatted;
      await store.set('cadenza:imps', life);
      updateLifetime(life);
    } catch (e) {}
    const elh = r.earlyLate;
    let timing = (elh.early || elh.late)
      ? (elh.early > elh.late * 1.5 ? 'You tend to rush \u2014 breathe.' : elh.late > elh.early * 1.5 ? 'You tend to drag \u2014 anticipate.' : 'Nicely balanced timing.')
      : '';
    if (r.impsEscaped) timing += (timing ? ' ' : '') + r.impsEscaped + (r.impsEscaped === 1 ? ' imp' : ' imps') + ' ate their fill of your ink and got away.';
    $('rTiming').textContent = timing;
    $('rNewBest').style.display = isBest && prev ? 'inline-block' : (isBest && !prev ? 'inline-block' : 'none');
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    show('results');
  }
  $('rRetry').addEventListener('click', () => { const r = G.run; startGame(r.song, r.diff); });
  $('rBack').addEventListener('click', () => { G.run = null; show('select'); renderSongs(); });

  /* ---------- input ---------- */
  const keyMap = { d: 0, f: 1, j: 2, k: 3, arrowleft: 0, arrowdown: 1, arrowup: 2, arrowright: 3 };
  window.addEventListener('keydown', e => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (G.screen === 'game') {
      if (k === 'escape') { togglePause(); return; }
      const lane = keyMap[k];
      if (lane != null) { e.preventDefault(); G.run.held[lane] = true; judge(lane); }
    } else if (G.screen === 'results' && (k === 'enter' || k === ' ')) {
      $('rBack').click();
    } else if (G.screen === 'title' && (k === 'enter' || k === ' ')) {
      enterHall();
    }
  });
  window.addEventListener('keyup', e => {
    const lane = keyMap[e.key.toLowerCase()];
    if (lane != null && G.run) { G.run.held[lane] = false; releaseLane(lane); }
  });
  // touch
  const touchLanes = new Map(); // touch identifier -> lane, so lifting one finger only releases its own lane
  gc.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = gc.getBoundingClientRect();
    for (const t of e.changedTouches) {
      const lane = clamp(Math.floor((t.clientX - rect.left) / (rect.width / 4)), 0, 3);
      touchLanes.set(t.identifier, lane);
      if (G.run) { G.run.held[lane] = true; judge(lane); }
    }
  }, { passive: false });
  function endTouch(e) {
    for (const t of e.changedTouches) {
      const lane = touchLanes.get(t.identifier);
      touchLanes.delete(t.identifier);
      if (lane == null || !G.run) continue;
      let stillHeld = false;
      for (const l of touchLanes.values()) if (l === lane) stillHeld = true;
      if (!stillHeld) { G.run.held[lane] = false; releaseLane(lane); }
    }
  }
  gc.addEventListener('touchend', endTouch);
  gc.addEventListener('touchcancel', endTouch);
  let mouseLane = -1;
  gc.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && G.run) {
      const rect = gc.getBoundingClientRect();
      const lane = clamp(Math.floor((e.clientX - rect.left) / (rect.width / 4)), 0, 3);
      mouseLane = lane;
      G.run.held[lane] = true; judge(lane);
    }
  });
  window.addEventListener('pointerup', e => {
    if (e.pointerType === 'mouse' && G.run && mouseLane >= 0) {
      G.run.held[mouseLane] = false;
      releaseLane(mouseLane);
      mouseLane = -1;
    }
  });

  function updateLifetime(n) {
    const e = $('lifetime');
    if (e) e.textContent = n > 0 ? n.toLocaleString() + (n === 1 ? ' imp' : ' imps') + ' repelled to date' : '';
  }

  /* ---------- title ---------- */
  function enterHall() {
    Sound.ensure();
    show('select');
    renderSongs();
  }
  $('enterBtn').addEventListener('click', enterHall);

  /* ---------- init ---------- */
  (async () => {
    G.songs = BUILTIN_SONGS.map(s => ({ ...s, events: songEvents(s) }));
    try {
      const saved = await store.get('cadenza:songs', []);
      if (Array.isArray(saved)) for (const s of saved) if (s && s.events && s.events.length) G.songs.push(s);
      G.scores = await store.get('cadenza:scores', {}) || {};
      const st = await store.get('cadenza:settings', null);
      if (st) G.settings = { ...G.settings, ...st };
    } catch (e) { /* fresh start */ }
    applySettings();
    try { updateLifetime((await store.get('cadenza:imps', 0)) || 0); } catch (e) {}
  })();
}

/* exports for node tests */
if (typeof module !== 'undefined' && module.exports) {
  module.exports = { BUILTIN_SONGS, SUITES, DIFFS, songEvents, buildChart, chartStats, songMeta, parseMIDI, parseMusicXML, makeBeatClock, DIFF_CONFIG };
}
if (typeof window !== 'undefined' && typeof document !== 'undefined') {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
}

</script>
