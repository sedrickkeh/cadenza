<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cadenza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --paper:#f2ecdd; --paper2:#ece4d0;
  --ink:#231f18;
  --ink-70:rgba(35,31,24,.7); --ink-55:rgba(35,31,24,.55); --ink-35:rgba(35,31,24,.35);
  --ink-18:rgba(35,31,24,.18); --ink-08:rgba(35,31,24,.08);
  --red:#a8352a; --red-soft:rgba(168,53,42,.12);
  --serif:Palatino,"Palatino Linotype","Book Antiqua",Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--paper);
  background-image:
    url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer></filter><rect width="240" height="240" filter="url(%23n)"/></svg>'),
    radial-gradient(140% 100% at 50% 20%, var(--paper) 55%, var(--paper2) 100%);
  color:var(--ink);
  font-family:var(--serif);
}
::selection{background:var(--red-soft)}
button{font-family:var(--serif);color:var(--ink)}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.screen{position:fixed;inset:0;z-index:1;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.sc{font-variant:small-caps;letter-spacing:.22em}

/* ---------- engraved rule ---------- */
.rule{display:flex;align-items:center;gap:12px;color:var(--ink)}
.rule::before,.rule::after{content:"";flex:1;height:1px;background:var(--ink-35)}
.rule .dia{width:6px;height:6px;background:var(--ink);transform:rotate(45deg)}

/* ---------- buttons ---------- */
.btn{display:inline-block;background:transparent;border:1.5px solid var(--ink);border-radius:2px;
  padding:12px 36px;font-size:17px;letter-spacing:.14em;font-variant:small-caps;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.fill{background:var(--ink);color:var(--paper)}
.btn.fill:hover{background:var(--red);border-color:var(--red)}

/* ---------- title page ---------- */
#screen-title{align-items:center;justify-content:center;text-align:center}
.opus{font-size:12px;letter-spacing:.34em;font-variant:small-caps;color:var(--ink-55);margin-bottom:26px}
.titleGlyph{font-size:44px;line-height:1;margin-bottom:14px;color:var(--red)}
.titleImps{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:16px}
.titleImps svg{overflow:visible}
.titleImps .m1{animation:impBob 2.4s ease-in-out infinite}
.titleImps .m2{animation:impBob 2.4s ease-in-out .3s infinite}
.titleImps .m3{animation:impBob 2.4s ease-in-out .6s infinite}
@keyframes impBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
#screen-title h1{font-size:clamp(58px,11vw,108px);font-weight:600;letter-spacing:.14em;line-height:1;text-indent:.14em}
.tagline{font-size:14px;letter-spacing:.3em;font-variant:small-caps;color:var(--ink-55);margin:20px 0 40px}
#screen-title .rule{width:min(380px,74vw);margin-bottom:44px}
.keyHint{margin-top:34px;font-size:12px;color:var(--ink-35);letter-spacing:.1em;font-variant:small-caps}
.keyHint kbd{display:inline-block;border:1px solid var(--ink-35);border-radius:3px;padding:1px 8px;margin:0 2px;font-family:var(--serif);font-size:12px}

/* ---------- programme (song select) ---------- */
#screen-select.dragging::after{content:"lay the score upon the desk";position:fixed;inset:16px;z-index:50;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-style:italic;color:var(--ink);
  background:rgba(242,236,221,.93);border:1.5px dashed var(--ink);border-radius:4px;pointer-events:none}
.selHead{padding:34px 26px 6px;text-align:center;flex-shrink:0}
.selHead h2{font-size:30px;font-weight:600;letter-spacing:.3em;font-variant:small-caps;text-indent:.3em}
.selHead .sub{font-size:12px;letter-spacing:.24em;font-variant:small-caps;color:var(--ink-55);margin-top:4px}
.selHead .rule{width:min(340px,66vw);margin:18px auto 0}
#songGrid{flex:1;overflow-y:auto;padding:14px 0 26px;width:min(620px,94vw);margin:0 auto;
  display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--ink-18) transparent}
.suiteHead{display:flex;align-items:baseline;gap:14px;padding:26px 14px 8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--ink-18)}
.suiteHead h3{font-size:15px;font-variant:small-caps;letter-spacing:.26em;font-weight:600}
.suiteHead .prog{font-size:11.5px;font-style:italic;color:var(--ink-35)}
.suiteHead .chev{margin-left:auto;font-size:12px;color:var(--ink-55);transition:transform .18s}
.suiteHead.closed .chev{transform:rotate(-90deg)}
.suiteHead:hover h3{color:var(--red)}
.progRow.locked{opacity:.38;cursor:default}
.progRow.locked:hover{background:transparent}
.progRow.locked:hover .num{color:var(--ink-55)}
.diff-virtuoso .dName{color:var(--red)}
.progRow{position:relative;display:flex;align-items:baseline;gap:14px;padding:16px 14px;cursor:pointer;
  border-bottom:1px solid var(--ink-08);transition:background .15s}
.progRow:hover{background:rgba(35,31,24,.035)}
.progRow:hover .num{color:var(--red)}
.num{width:38px;text-align:right;font-size:16px;font-style:italic;color:var(--ink-55);flex-shrink:0;transition:color .15s}
.pMain{display:flex;flex-direction:column;gap:2px;min-width:0}
.pTitle{font-size:20px;font-weight:600;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pMeta{font-size:12px;color:var(--ink-55);letter-spacing:.04em}
.pStars{letter-spacing:.1em}
.leader{flex:1;border-bottom:1px dotted var(--ink-35);transform:translateY(-5px);min-width:24px}
.pComposer{font-size:12.5px;font-variant:small-caps;letter-spacing:.18em;color:var(--ink-70);flex-shrink:0}
.seal{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;
  border:1.5px solid var(--red);border-radius:50%;color:var(--red);font-size:13px;font-weight:600;
  transform:rotate(-8deg);align-self:center}
.sealGhost{width:30px;flex-shrink:0}
.delBtn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;
  background:transparent;color:var(--ink-35);font-size:16px;line-height:1;cursor:pointer;opacity:0;transition:opacity .15s}
.progRow:hover .delBtn{opacity:1}
.delBtn:hover{color:var(--red)}
.uploadRow .pTitle{font-style:italic;font-weight:400}
.uploadRow .num{color:var(--red)}

/* ---------- settings footer ---------- */
.settingsBar{flex-shrink:0;display:flex;flex-wrap:wrap;gap:14px 32px;align-items:center;justify-content:center;
  padding:13px 22px calc(15px + env(safe-area-inset-bottom));border-top:1px solid var(--ink-18);
  font-size:12px;color:var(--ink-70)}
.settingsBar label{display:flex;align-items:center;gap:9px;font-variant:small-caps;letter-spacing:.16em}
input[type=range]{-webkit-appearance:none;appearance:none;width:110px;height:2px;background:var(--ink-35);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--ink);border:none;cursor:pointer}
input[type=checkbox]{accent-color:var(--red);width:15px;height:15px}
#speedVal{color:var(--red);min-width:14px;text-align:center;font-feature-settings:"tnum"}

/* ---------- modal ---------- */
#modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(35,31,24,.32);padding:20px}
#modal.open{display:flex}
.modalBox{position:relative;width:min(440px,94vw);max-height:88vh;overflow-y:auto;background:var(--paper);
  border:1px solid var(--ink);outline:1px solid var(--ink-35);outline-offset:5px;
  padding:32px 30px;box-shadow:0 18px 60px rgba(35,31,24,.28)}
#modalClose{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--ink-55);font-size:24px;cursor:pointer;line-height:1}
#modalClose:hover{color:var(--red)}
.diffWrap{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.diffWrap h2{font-size:26px;font-weight:600}
.diffWrap .composer{font-size:12px;font-variant:small-caps;letter-spacing:.2em;color:var(--ink-55)}
.previewBtn{margin:14px 0 4px;background:transparent;border:1px solid var(--ink-35);border-radius:2px;
  padding:7px 22px;font-size:13px;font-variant:small-caps;letter-spacing:.18em;cursor:pointer;transition:all .15s}
.previewBtn:hover{border-color:var(--ink);background:rgba(35,31,24,.04)}
.previewBtn.playing{color:var(--red);border-color:var(--red)}
.diffList{width:100%;display:flex;flex-direction:column;margin-top:12px}
.diffRow{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:1px 12px;text-align:left;
  background:transparent;border:none;border-top:1px solid var(--ink-18);border-left:3px solid transparent;
  padding:14px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.diffRow:last-child{border-bottom:1px solid var(--ink-18)}
.diffRow:hover{border-left-color:var(--red);background:rgba(35,31,24,.03)}
.dName{font-size:19px;font-weight:600;letter-spacing:.02em}
.dStars{grid-column:2;grid-row:1;font-size:13px;color:var(--ink);align-self:center;letter-spacing:.12em}
.dStars .dim{color:var(--ink-18)}
.dNotes{font-size:11.5px;color:var(--ink-55);letter-spacing:.04em}
.dBest{grid-column:2;grid-row:2;font-size:11.5px;text-align:right;color:var(--red)}
.dBest.dim{color:var(--ink-35)}
.titleInput{width:100%;margin:10px 0 4px;background:transparent;border:none;border-bottom:1px solid var(--ink-35);
  color:var(--ink);font-family:var(--serif);font-size:20px;text-align:center;padding:8px 6px;outline:none;font-style:italic}
.titleInput:focus{border-color:var(--red)}
.cardMeta.center{text-align:center;font-size:12.5px;color:var(--ink-55);margin:8px 0 2px}
.primaryBtn{margin-top:16px}

/* ---------- game ---------- */
.gameHud{flex-shrink:0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;
  padding:calc(12px + env(safe-area-inset-top)) 20px 8px}
.hudLeft{min-width:0;display:flex;align-items:baseline;gap:12px}
#gSong{font-size:17px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#gDiff{font-size:10.5px;font-variant:small-caps;letter-spacing:.26em;color:var(--red)}
.hudRight{text-align:right;display:flex;align-items:baseline;gap:14px}
#gScore{font-size:19px;letter-spacing:.1em;font-feature-settings:"tnum"}
#gAcc{font-size:12px;color:var(--ink-55);font-feature-settings:"tnum"}
#pauseBtn{background:none;border:1px solid var(--ink-35);color:var(--ink-55);border-radius:2px;
  width:32px;height:32px;font-size:11px;cursor:pointer;flex-shrink:0;align-self:center}
#pauseBtn:hover{color:var(--ink);border-color:var(--ink)}
.progressTrack{height:2px;background:var(--ink-08);flex-shrink:0;margin:0 20px}
#gProgress{height:100%;width:0;background:var(--ink);transition:width .2s linear}
.lifeTrack{height:4px;background:var(--ink-08);flex-shrink:0;margin:3px 20px 0}
#gLife{height:100%;width:100%;background:var(--red);transition:width .15s linear}
#gLife.low{animation:lifePulse .55s ease-in-out infinite}
@keyframes lifePulse{50%{opacity:.3}}
#gameCanvas{flex:1;width:100%;touch-action:none}
#pauseMenu{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
  background:rgba(242,236,221,.92)}
#pauseMenu.open{display:flex}
.pauseBox{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center}
.pauseBox h2{font-size:34px;font-style:italic;font-weight:600;margin-bottom:12px}
.pauseBox .btn{width:230px}

/* ---------- results ---------- */
#screen-results{align-items:center;justify-content:center;text-align:center;padding:24px;gap:2px;overflow-y:auto}
#screen-results.active>*{animation:riseIn .5s cubic-bezier(.2,.8,.3,1) both}
#screen-results.active>*:nth-child(2){animation:none}
#screen-results.active>*:nth-child(3){animation-delay:.5s}
#screen-results.active>*:nth-child(4){animation-delay:.58s}
#screen-results.active>*:nth-child(5){animation-delay:.66s}
#screen-results.active>*:nth-child(6){animation-delay:.74s}
#screen-results.active>*:nth-child(7){animation-delay:.82s}
#screen-results.active>*:nth-child(8){animation-delay:.9s}
#screen-results.active>*:nth-child(9){animation-delay:.98s}
#screen-results.active #rGrade{animation:stampIn .55s cubic-bezier(.25,1.5,.45,1) both .25s}
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes stampIn{0%{opacity:0;transform:rotate(7deg) scale(2.4)}100%{opacity:1;transform:rotate(-8deg) scale(1)}}
#rSong{font-size:12px;font-variant:small-caps;letter-spacing:.24em;color:var(--ink-55);margin-bottom:20px}
#rGrade{width:128px;height:128px;border:3px solid currentColor;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:64px;font-weight:600;transform:rotate(-8deg);flex-shrink:0}
#rFlavor{font-style:italic;font-size:18px;color:var(--ink-70);margin-top:18px}
#rScore{font-size:38px;letter-spacing:.12em;margin-top:10px;font-feature-settings:"tnum"}
.chips{display:flex;gap:10px;margin-top:10px}
#rNewBest{display:none;font-size:11px;font-variant:small-caps;letter-spacing:.26em;color:var(--red);
  border:1px solid var(--red);border-radius:2px;padding:3px 14px}
#rFC{display:none;font-size:11px;font-variant:small-caps;letter-spacing:.26em;color:var(--ink);
  border:1px solid var(--ink);border-radius:2px;padding:3px 14px}
#lifetime{margin-top:12px;font-size:12.5px;font-style:italic;color:var(--ink-35)}
.seal.fc{box-shadow:0 0 0 2px var(--paper),0 0 0 3.5px var(--red)}
.rStats{display:flex;gap:34px;margin-top:20px}
.rStat .v{font-size:20px;font-feature-settings:"tnum"}
.rStat .l{font-size:10.5px;font-variant:small-caps;letter-spacing:.2em;color:var(--ink-35);margin-top:2px}
.rCounts{display:flex;gap:22px;margin-top:16px;font-size:13.5px;color:var(--ink-70)}
.rCounts b{font-weight:600;font-feature-settings:"tnum"}
.rCounts .rp{color:var(--red)}
#rTiming{font-style:italic;font-size:14px;color:var(--ink-55);margin-top:16px;min-height:18px}
.rBtns{display:flex;gap:14px;margin-top:22px}

/* ---------- grades ---------- */
.grade-SS,.grade-S{color:var(--red)} .grade-A{color:var(--ink)} .grade-B{color:var(--ink-70)}
.grade-C{color:var(--ink-55)} .grade-D{color:var(--ink-35)} .grade-F{color:var(--red)}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translate(-50%,16px);z-index:60;
  background:var(--paper);border:1px solid var(--ink);color:var(--ink);font-size:13.5px;font-style:italic;
  padding:10px 24px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:88vw;text-align:center;
  box-shadow:0 6px 24px rgba(35,31,24,.18)}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast.bad{border-color:var(--red);color:var(--red)}
@media (max-width:560px){
  .leader{display:none}
  .pComposer{display:none}
  .rStats{gap:22px}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="screen active" id="screen-title">
  <div class="opus">a rhythm recital &middot; op. 1</div>
  <div class="titleImps" aria-hidden="true">
    <svg class="m2" width="46" height="44" viewBox="0 0 52 48" fill="none">
      <ellipse cx="20" cy="45" rx="4.4" ry="3" fill="#5b9e97" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="32" cy="45" rx="4.4" ry="3" fill="#5b9e97" stroke="#231f18" stroke-width="1.8"/>
      <circle cx="18" cy="13" r="3.2" fill="#5b9e97" stroke="#231f18" stroke-width="1.8"/>
      <circle cx="34" cy="13" r="3.2" fill="#5b9e97" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="26" cy="29" rx="13.5" ry="13" fill="#5b9e97" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="26" cy="34" rx="7" ry="5" fill="#fff" opacity=".3"/>
      <circle cx="21" cy="26" r="4" fill="#fff" stroke="#231f18" stroke-width="1.4"/>
      <circle cx="31" cy="26" r="4" fill="#fff" stroke="#231f18" stroke-width="1.4"/>
      <circle cx="21.7" cy="26.7" r="1.8" fill="#231f18"/>
      <circle cx="31.7" cy="26.7" r="1.8" fill="#231f18"/>
      <circle cx="15.5" cy="32" r="2.3" fill="#e06e6e" opacity=".38"/>
      <circle cx="36.5" cy="32" r="2.3" fill="#e06e6e" opacity=".38"/>
      <path d="M23 33 Q26 35.5 29 33" stroke="#231f18" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <svg class="m1" width="66" height="60" viewBox="0 0 60 56" fill="none">
      <ellipse cx="23" cy="52" rx="5" ry="3.4" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <ellipse cx="37" cy="52" rx="5" ry="3.4" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <circle cx="8" cy="30" r="6" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <path d="M8 30 L2 26 L2 34 Z" fill="var(--paper,#f2ecdd)"/>
      <circle cx="52" cy="30" r="6" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <path d="M52 30 L58 26 L58 34 Z" fill="var(--paper,#f2ecdd)"/>
      <circle cx="21" cy="16" r="3.2" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <circle cx="30" cy="13.5" r="3.2" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <circle cx="39" cy="16" r="3.2" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <ellipse cx="30" cy="33" rx="16.5" ry="15.5" fill="#e07a52" stroke="#231f18" stroke-width="2"/>
      <ellipse cx="30" cy="39" rx="9" ry="6" fill="#fff" opacity=".3"/>
      <circle cx="24" cy="29" r="5" fill="#fff" stroke="#231f18" stroke-width="1.5"/>
      <circle cx="36" cy="29" r="5" fill="#fff" stroke="#231f18" stroke-width="1.5"/>
      <circle cx="24.8" cy="29.9" r="2.2" fill="#231f18"/>
      <circle cx="36.8" cy="29.9" r="2.2" fill="#231f18"/>
      <circle cx="17.5" cy="37" r="2.8" fill="#e06e6e" opacity=".38"/>
      <circle cx="42.5" cy="37" r="2.8" fill="#e06e6e" opacity=".38"/>
      <path d="M26 39 Q30 42.5 34 39" stroke="#231f18" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <svg class="m3" width="46" height="44" viewBox="0 0 52 48" fill="none">
      <ellipse cx="20" cy="45" rx="4.4" ry="3" fill="#b088c9" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="32" cy="45" rx="4.4" ry="3" fill="#b088c9" stroke="#231f18" stroke-width="1.8"/>
      <path d="M26 16 Q29 8 24 5" stroke="#231f18" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="24" cy="5" r="2.6" fill="#b088c9" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="26" cy="29" rx="13.5" ry="13" fill="#b088c9" stroke="#231f18" stroke-width="1.8"/>
      <ellipse cx="26" cy="34" rx="7" ry="5" fill="#fff" opacity=".3"/>
      <circle cx="21" cy="26" r="4" fill="#fff" stroke="#231f18" stroke-width="1.4"/>
      <circle cx="31" cy="26" r="4" fill="#fff" stroke="#231f18" stroke-width="1.4"/>
      <circle cx="21.7" cy="26.7" r="1.8" fill="#231f18"/>
      <circle cx="31.7" cy="26.7" r="1.8" fill="#231f18"/>
      <circle cx="15.5" cy="32" r="2.3" fill="#e06e6e" opacity=".38"/>
      <circle cx="36.5" cy="32" r="2.3" fill="#e06e6e" opacity=".38"/>
      <path d="M23 33 Q26 35.5 29 33" stroke="#231f18" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>CADENZA</h1>
  <div class="tagline">every score becomes a stage</div>
  <div class="rule"><span class="dia"></span></div>
  <button id="enterBtn" class="btn fill">Begin the recital</button>
  <div class="keyHint"><kbd>D</kbd><kbd>F</kbd><kbd>J</kbd><kbd>K</kbd> or arrow keys &middot; tap on touch</div>
  <div id="lifetime"></div>
</div>

<div class="screen" id="screen-select">
  <div class="selHead">
    <h2>Programme</h2>
    <div class="sub">choose a piece &middot; or bring your own</div>
    <div class="rule"><span class="dia"></span></div>

/* ============================================================
   COMPACT SONG NOTATION + THE SEVEN SUITES
   token: pitch(a-g)(#|b)?octave + dur(w|h|q|e|s)(.?)  rest: r+dur
   ============================================================ */
const NOTE_BASE = { c: 0, d: 2, e: 4, f: 5, g: 7, a: 9, b: 11 };
const DUR_MAP = { w: 4, h: 2, q: 1, e: 0.5, s: 0.25 };

function parseMel(str) {
  const out = [];
  let beat = 0;
  for (const tok of str.trim().split(/[\s|]+/)) {
    if (!tok) continue;
    const m = tok.match(/^([a-gr])([#b]?)(-?\d)?(w|h|q|e|s)(\.?)$/i);
    if (!m) throw new Error('bad token: ' + tok);
    const dur = DUR_MAP[m[4].toLowerCase()] * (m[5] ? 1.5 : 1);
    const L = m[1].toLowerCase();
    if (L !== 'r') {
      const oct = parseInt(m[3], 10);
      if (isNaN(oct)) throw new Error('missing octave: ' + tok);
      const midi = 12 * (oct + 1) + NOTE_BASE[L] + (m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0);
      out.push([beat, midi, Math.max(0.2, dur * 0.92)]);
    }
    beat += dur;
  }
  return { notes: out, beats: beat };
}

function genBass(chordStr, bpb, pattern, totalBeats) {
  if (!chordStr || pattern === 'none') return [];
  const chords = chordStr.trim().split(/\s+/);
  const out = [];
  let beat = 0, ci = 0;
  while (beat < totalBeats - 0.01) {
    const c = chords[ci % chords.length];
    const m = c.match(/^([A-Ga-g])([#b]?)(m?)/);
    const root = 36 + ((NOTE_BASE[m[1].toLowerCase()] + (m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0)) + 12) % 12 + 12;
    const fifth = root + 7, third = root + (m[3] === 'm' ? 3 : 4);
    if (pattern === 'oom') out.push([beat, root, bpb * 0.9]);
    else if (pattern === 'oompah') { for (let b = 0; b < bpb; b++) out.push([beat + b, b % 2 === 0 ? root : fifth, 0.85]); }
    else if (pattern === 'waltz') { out.push([beat, root, 0.9]); for (let b = 1; b < bpb; b++) out.push([beat + b, fifth, 0.8]); }
    else if (pattern === 'half') { out.push([beat, root, Math.min(1.9, bpb * 0.9)]); if (bpb >= 4) out.push([beat + 2, fifth, 1.9]); }
    else if (pattern === 'arp') { const seq = [root, third, fifth, third]; for (let b = 0; b < bpb; b++) out.push([beat + b, seq[b % 4], 0.9]); }
    beat += bpb; ci++;
  }
  return out;
}

function S(id, title, composer, bpm, o) {
  const mel = parseMel(o.mel);
  const bpb = o.bpb || 4;
  const total = Math.ceil(mel.beats / bpb) * bpb;
  const bass = genBass(o.chords, bpb, o.pattern || 'half', total);
  return { id, title, composer, bpm, repeats: o.repeats || 2, notes: [...mel.notes, ...bass] };
}

// Convert a song definition into absolute note events {t, midi, dur} in seconds
function songEvents(song) {
  if (song.events) return song.events;
  const spb = 60 / song.bpm;
  let notes = song.notes;
  if (song.repeats && song.repeats > 1) {
    const len = Math.ceil(notes.reduce((m, n) => Math.max(m, n[0] + n[2]), 0)) + 1;
    const out = notes.slice();
    for (let rp = 1; rp < song.repeats; rp++) out.push(...notes.map(([b, m, d]) => [b + len * rp, m, d]));
    notes = out;
  }
  const evs = notes
    .map(([b, m, d]) => ({ t: b * spb, midi: m, dur: Math.max(0.08, d * spb) }))
    .sort((a, b) => a.t - b.t || a.midi - b.midi);
  song.events = evs;
  if (!song.bpmHint) song.bpmHint = song.bpm;
  return evs;
}

/* ============================================================
   MIDI parser  (.mid / .midi)  — pure function, no DOM needed
   ============================================================ */
function parseMIDI(arrayBuffer, filename) {
  const dv = new DataView(arrayBuffer);
  let p = 0;
  const u8 = () => dv.getUint8(p++);
  const u16 = () => { const v = dv.getUint16(p); p += 2; return v; };
  const u32 = () => { const v = dv.getUint32(p); p += 4; return v; };
  const str4 = () => String.fromCharCode(u8(), u8(), u8(), u8());
  const vlq = () => { let v = 0, b; do { b = u8(); v = (v << 7) | (b & 0x7f); } while (b & 0x80); return v; };

  if (str4() !== 'MThd') throw new Error('Not a MIDI file (missing MThd header).');
  const hlen = u32();
  const format = u16(); const ntrks = u16(); const division = u16();
  p += hlen - 6;

  let ticksPerSec = null, tpq = 480;
  if (division & 0x8000) {
    const fps = 256 - ((division >> 8) & 0xff);
    const tpf = division & 0xff;
    ticksPerSec = fps * tpf;                    // SMPTE timing: constant rate
  } else {
    tpq = division || 480;
  }

  const tempoEvents = [];                        // {tick, usq}
  const raw = [];                                // {onTick, offTick, midi, vel, ch}
  let trackName = null;

  for (let tr = 0; tr < ntrks; tr++) {
    if (p + 8 > dv.byteLength) break;
    if (str4() !== 'MTrk') throw new Error('Malformed MIDI (missing MTrk).');
    const len = u32(); const end = p + len;
    let abs = 0, running = 0;
    const open = {};                             // key ch:note -> stack of raw refs
    while (p < end) {
      abs += vlq();
      let b = u8();
      if (b < 0x80) { p--; b = running; } else if (b < 0xf0) running = b;
      const hi = b & 0xf0, ch = b & 0x0f;
      if (hi === 0x90 || hi === 0x80) {
        const note = u8(), vel = u8();
        const key = ch + ':' + note;
        if (hi === 0x90 && vel > 0) {
          const ev = { onTick: abs, offTick: null, midi: note, vel, ch };
          (open[key] = open[key] || []).push(ev);
          raw.push(ev);
        } else {
          const stack = open[key];
          if (stack && stack.length) stack.shift().offTick = abs;
        }
      } else if (hi === 0xa0 || hi === 0xb0 || hi === 0xe0) { p += 2; }
      else if (hi === 0xc0 || hi === 0xd0) { p += 1; }
      else if (b === 0xf0 || b === 0xf7) { p += vlq(); }
      else if (b === 0xff) {
        const type = u8(); const mlen = vlq(); const mstart = p;
        if (type === 0x51 && mlen === 3) {
          const usq = (dv.getUint8(p) << 16) | (dv.getUint8(p + 1) << 8) | dv.getUint8(p + 2);
          tempoEvents.push({ tick: abs, usq });
        } else if ((type === 0x03 || type === 0x01) && !trackName && mlen > 0 && mlen < 128) {
          let s = ''; for (let i = 0; i < mlen; i++) s += String.fromCharCode(dv.getUint8(p + i));
          if (/^[\x20-\x7e]+$/.test(s.trim()) && s.trim().length > 1) trackName = s.trim();
        }
        p = mstart + mlen;
      } else { /* unknown status; bail on this track */ p = end; }
    }
    p = end;
  }

  // ticks -> seconds
  let toSec;
  if (ticksPerSec) {
    toSec = t => t / ticksPerSec;
  } else {
    tempoEvents.sort((a, b) => a.tick - b.tick);
    const segs = []; let sec = 0, lastTick = 0, usq = 500000;
    segs.push({ tick: 0, sec: 0, usq });
    for (const te of tempoEvents) {
      sec += (te.tick - lastTick) * (usq / 1e6) / tpq;
      lastTick = te.tick; usq = te.usq;
      segs.push({ tick: lastTick, sec, usq });
    }
    toSec = t => {
      let s = segs[0];
      for (let i = segs.length - 1; i >= 0; i--) if (segs[i].tick <= t) { s = segs[i]; break; }
      return s.sec + (t - s.tick) * (s.usq / 1e6) / tpq;
    };
  }

  let events = raw
    .filter(r => r.ch !== 9)                     // skip percussion channel
    .map(r => {
      const t = toSec(r.onTick);
      const off = r.offTick == null ? r.onTick + tpq / 2 : r.offTick;
      return { t, midi: r.midi, dur: Math.max(0.08, toSec(off) - t), vel: r.vel / 127 };
    })
    .filter(e => e.midi >= 21 && e.midi <= 108)
    .sort((a, b) => a.t - b.t || a.midi - b.midi);

  if (!events.length) throw new Error('No playable notes found in this MIDI file.');
  if (events.length > 5000) events = events.slice(0, 5000);
  const t0 = events[0].t;
  if (t0 > 0.05) events = events.map(e => ({ ...e, t: e.t - t0 }));

  // bpm hint from first tempo
  let bpmHint = 120;
  if (!ticksPerSec && tempoEvents.length) bpmHint = Math.round(6e7 / tempoEvents[0].usq);
  return { events, title: trackName, bpmHint };
}

/* ============================================================
   MusicXML parser (.musicxml / .xml) and .mxl (zipped)
   ============================================================ */
function makeBeatClock(tempoMap) {
  const map = (tempoMap && tempoMap.length ? tempoMap : [{ beat: 0, bpm: 120 }])
    .slice().sort((a, b) => a.beat - b.beat);
  if (map[0].beat > 0) map.unshift({ beat: 0, bpm: map[0].bpm });
  const segs = []; let sec = 0;
  for (let i = 0; i < map.length; i++) {
    if (i > 0) sec += (map[i].beat - map[i - 1].beat) * 60 / map[i - 1].bpm;
    segs.push({ beat: map[i].beat, bpm: map[i].bpm, sec });
  }
  return beat => {
    let s = segs[0];
    for (let i = segs.length - 1; i >= 0; i--) if (segs[i].beat <= beat + 1e-9) { s = segs[i]; break; }
    return s.sec + (beat - s.beat) * 60 / s.bpm;
  };
}

const STEP_SEMITONE = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

function parseMusicXML(text, filename, DP) {
  const Parser = DP || (typeof DOMParser !== 'undefined' ? DOMParser : null);
  if (!Parser) throw new Error('No XML parser available.');
  const doc = new Parser().parseFromString(text, 'application/xml');
  const perr = doc.getElementsByTagName('parsererror');
  if (perr && perr.length) throw new Error('Could not read this file as XML.');
  const rootTag = doc.documentElement && doc.documentElement.tagName;
  if (rootTag !== 'score-partwise') {
    if (rootTag === 'score-timewise') throw new Error('Timewise MusicXML is not supported yet — please export as partwise (the default in most editors).');
    throw new Error('This XML file does not look like MusicXML.');
  }

  const grab = (el, tag) => { const n = el.getElementsByTagName(tag); return n.length ? n[0] : null; };
  const txt = (el, tag) => { const n = grab(el, tag); return n ? n.textContent.trim() : null; };

  let title = txt(doc.documentElement, 'work-title') || txt(doc.documentElement, 'movement-title') || null;

  const tempoMap = [];   // {beat, bpm}
  const rawNotes = [];   // {beat, midi, durBeats}

  const parts = Array.from(doc.getElementsByTagName('part'));
  if (!parts.length) throw new Error('No parts found in this MusicXML file.');

  for (const part of parts) {
    let divisions = 1, transpose = 0, cur = 0, lastStart = 0;
    const pendingTies = {};  // voice:midi -> note ref to extend
    const measures = Array.from(part.children).filter(c => c.tagName === 'measure');
    for (const measure of measures) {
      for (const child of Array.from(measure.children)) {
        const tag = child.tagName;
        if (tag === 'attributes') {
          const d = txt(child, 'divisions'); if (d) divisions = Math.max(1, parseInt(d, 10) || 1);
          const tr = grab(child, 'transpose');
          if (tr) {
            const chrom = parseInt(txt(tr, 'chromatic') || '0', 10) || 0;
            const oct = parseInt(txt(tr, 'octave-change') || '0', 10) || 0;
            transpose = chrom + 12 * oct;
          }
        } else if (tag === 'direction' || tag === 'sound') {
          const sounds = tag === 'sound' ? [child] : Array.from(child.getElementsByTagName('sound'));
          for (const s of sounds) {
            const tempo = parseFloat(s.getAttribute && s.getAttribute('tempo'));
            if (tempo && tempo > 0) tempoMap.push({ beat: cur, bpm: tempo });
          }
          if (tag === 'direction') {
            const met = grab(child, 'metronome');
            if (met) {
              const pm = parseFloat(txt(met, 'per-minute'));
              const unit = txt(met, 'beat-unit') || 'quarter';
              const mult = { whole: 4, half: 2, quarter: 1, eighth: 0.5, '16th': 0.25 }[unit] || 1;
              if (pm && pm > 0) tempoMap.push({ beat: cur, bpm: pm * mult });
            }
          }
        } else if (tag === 'backup') {
          cur -= (parseInt(txt(child, 'duration') || '0', 10) || 0) / divisions;
        } else if (tag === 'forward') {
          cur += (parseInt(txt(child, 'duration') || '0', 10) || 0) / divisions;
        } else if (tag === 'note') {
          const isChord = grab(child, 'chord') != null;
          const isGrace = grab(child, 'grace') != null;
          const durTicks = parseInt(txt(child, 'duration') || '0', 10) || 0;
          const durBeats = durTicks / divisions;
          const start = isChord ? lastStart : cur;
          const pitch = grab(child, 'pitch');
          const isRest = grab(child, 'rest') != null;
          if (!isRest && pitch && !isGrace) {
            const step = txt(pitch, 'step') || 'C';
            const alter = parseFloat(txt(pitch, 'alter') || '0') || 0;
            const octave = parseInt(txt(pitch, 'octave') || '4', 10);
            const midi = Math.round((octave + 1) * 12 + (STEP_SEMITONE[step] ?? 0) + alter + transpose);
            const voice = txt(child, 'voice') || '1';
            const ties = Array.from(child.getElementsByTagName('tie')).map(t => t.getAttribute('type'));
            const key = voice + ':' + midi;
            if (ties.includes('stop') && pendingTies[key]) {
              pendingTies[key].durBeats += durBeats;      // extend, no new attack
              if (!ties.includes('start')) delete pendingTies[key];
            } else if (midi >= 21 && midi <= 108) {
              const n = { beat: start, midi, durBeats: Math.max(durBeats, 0.05) };
              rawNotes.push(n);
              if (ties.includes('start')) pendingTies[key] = n;
            }
          }
          if (!isChord && !isGrace) { lastStart = cur; cur += durBeats; }
        }
      }
      if (cur < 0) cur = 0;
    }
  }

  if (!rawNotes.length) throw new Error('No playable notes found in this score.');
  const clock = makeBeatClock(tempoMap);
  let events = rawNotes.map(n => {
    const t = clock(n.beat);
    return { t, midi: n.midi, dur: Math.max(0.08, clock(n.beat + n.durBeats) - t) };
  }).sort((a, b) => a.t - b.t || a.midi - b.midi);

  // dedupe identical simultaneous pitches (merged staves often double notes)
  const seen = new Set(); const out = [];
  for (const e of events) {
    const k = Math.round(e.t * 200) + ':' + e.midi;
    if (seen.has(k)) continue;
    seen.add(k); out.push(e);
  }
  events = out;
  if (events.length > 5000) events = events.slice(0, 5000);
  const t0 = events[0].t;
  if (t0 > 0.05) events = events.map(e => ({ ...e, t: e.t - t0 }));

  const bpmHint = tempoMap.length ? Math.round(tempoMap[0].bpm) : 120;
  return { events, title, bpmHint };
}

async function parseMXL(arrayBuffer, filename) {
  if (typeof JSZip === 'undefined') {
    throw new Error('Compressed .mxl needs an internet connection to load the unzip library — or export as .musicxml instead.');
  }
  const zip = await JSZip.loadAsync(arrayBuffer);
  let rootPath = null;
  const container = zip.file('META-INF/container.xml');
  if (container) {
    const ctext = await container.async('string');
    const m = ctext.match(/full-path="([^"]+)"/);
    if (m) rootPath = m[1];
  }
  if (!rootPath || !zip.file(rootPath)) {
    rootPath = Object.keys(zip.files).find(n =>
      !n.startsWith('META-INF') && /\.(xml|musicxml)$/i.test(n) && !zip.files[n].dir);
  }
  if (!rootPath) throw new Error('Could not find a score inside this .mxl archive.');
  const text = await zip.file(rootPath).async('string');
  return parseMusicXML(text, filename);
}

const DIFF_CONFIG = {
  easy:     { maxChord: 1, laneGap: 0.34, globalGap: 0.30, label: 'Easy', holdMin: 0.8 },
  normal:   { maxChord: 1, laneGap: 0.20, globalGap: 0.11, label: 'Normal', holdMin: 0.65 },
  hard:     { maxChord: 3, laneGap: 0.08, globalGap: 0.04, label: 'Hard', holdMin: 0.55,
              burst: { rateBeats: 0.5, minGap: 0.85, maxNotes: 12, chance: 0.62, jackP: 0.12 } },
  virtuoso: { maxChord: 3, laneGap: 0.055, globalGap: 0.026, label: 'Virtuoso', holdMin: 0.5,
              burst: { rateBeats: 0.25, minGap: 0.6, maxNotes: 24, chance: 0.9, jackP: 0.28 } },
};

function hashStr(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function mulberry32(seed) { return function () { seed |= 0; seed = (seed + 0x6D2B79F5) | 0; let z = Math.imul(seed ^ (seed >>> 15), 1 | seed); z = (z + Math.imul(z ^ (z >>> 7), 61 | z)) ^ z; return ((z ^ (z >>> 14)) >>> 0) / 4294967296; }; }
const DIFFS = ['easy', 'normal', 'hard', 'virtuoso'];

// Cluster raw events into chords (notes within 35ms), then place onto 4 lanes.
function buildChart(events, diff, bpmHint) {
  const cfg = DIFF_CONFIG[diff] || DIFF_CONFIG.normal;
  if (!events.length) return [];

  // 1. cluster into chords
  const clusters = [];
  let cur = null;
  for (const e of events) {
    if (cur && e.t - cur.t <= 0.035) {
      cur.notes.push(e);
    } else {
      cur = { t: e.t, notes: [e] };
      clusters.push(cur);
    }
  }

  // 2. pitch quartiles → base lane bins
  const pitches = events.map(e => e.midi).slice().sort((a, b) => a - b);
  const q = p => pitches[Math.min(pitches.length - 1, Math.floor(p * pitches.length))];
  const q1 = q(0.25), q2 = q(0.5), q3 = q(0.75);
  const baseLane = m => (m < q1 ? 0 : m < q2 ? 1 : m < q3 ? 2 : 3);

  const laneFree = [-Infinity, -Infinity, -Infinity, -Infinity];
  let lastGlobal = -Infinity;
  let prevLane = -1, prevPitch = -1, prevT = -Infinity;
  const chart = [];
  const holdMinEff = Math.max(cfg.holdMin || 99, (60 / (bpmHint || 120)) * 1.6);

  for (let ci = 0; ci < clusters.length; ci++) {
    const cl = clusters[ci];
    if (cl.t - lastGlobal < cfg.globalGap) continue;

    // pick chord notes: highest, lowest, middle
    const sorted = cl.notes.slice().sort((a, b) => a.midi - b.midi);
    const picks = [];
    picks.push(sorted[sorted.length - 1]); // melody (highest)
    if (cfg.maxChord >= 2 && sorted.length >= 2) picks.push(sorted[0]);
    if (cfg.maxChord >= 3 && sorted.length >= 3) picks.push(sorted[Math.floor(sorted.length / 2)]);

    const placed = [];
    for (const n of picks) {
      let want = baseLane(n.midi);
      // contour-following for fast runs (melody note only)
      if (n === picks[0] && prevLane >= 0 && cl.t - prevT < 0.16 && Math.abs(n.midi - prevPitch) <= 12) {
        const dir = Math.sign(n.midi - prevPitch);
        if (dir !== 0) want = clamp(prevLane + dir, 0, 3);
        else want = prevLane;
      }
      // find a free lane near the desired one, not colliding with this chord
      const order = [];
      for (let d = 0; d < 4; d++) {
        if (want + d <= 3 && !order.includes(want + d)) order.push(want + d);
        if (want - d >= 0 && !order.includes(want - d)) order.push(want - d);
      }
      let lane = -1;
      for (const l of order) {
        if (cl.t - laneFree[l] >= cfg.laneGap && !placed.some(p => p.lane === l)) { lane = l; break; }
      }
      if (lane === -1) continue; // drop unplaceable
      const isHold = n === picks[0] && cfg.holdMin && n.dur >= holdMinEff;
      const holdDur = isHold ? clamp(n.dur, holdMinEff * 0.8, 4) : 0;
      placed.push({ t: cl.t, lane, midi: n.midi, dur: n.dur, hold: isHold, tailT: isHold ? cl.t + holdDur : cl.t });
      laneFree[lane] = isHold ? cl.t + holdDur : cl.t;
    }
    if (placed.length) {
      lastGlobal = cl.t;
      const melody = placed[0];
      prevLane = melody.lane; prevPitch = melody.midi; prevT = cl.t;
      chart.push(...placed);
    }
  }
  // ---- burst streams (jacks / trills / rolls): fill silences AND drum over sustains ----
  if (cfg.burst && chart.length > 4) {
    const B = cfg.burst;
    const rng = mulberry32(hashStr(diff + '|' + events.length + '|' + Math.round(events[0].midi) + '|' + Math.round(events[events.length - 1].t * 10)));
    const spb = 60 / (bpmHint || 120);
    const rate = Math.max(B.rateBeats * spb, cfg.laneGap + 0.012, 0.072);
    chart.sort((a, b) => a.t - b.t || a.lane - b.lane);
    const holdSpans = chart.filter(n => n.hold).map(n => ({ lane: n.lane, start: n.t, end: n.tailT + 0.15 }));
    const byLane = [[], [], [], []];
    for (const n of chart) byLane[n.lane].push([n.t, n.hold ? n.tailT : n.t]);
    const laneBlocked = (l, bt) =>
      byLane[l].some(sp => bt > sp[0] - cfg.laneGap && bt < sp[1] + cfg.laneGap) ||
      holdSpans.some(h => h.lane === l && bt > h.start - 0.05 && bt < h.end);
    // collect stream windows
    const wins = [];
    let lastEnd = -Infinity;
    for (const n of chart) {
      if (lastEnd > -Infinity && n.t - lastEnd >= B.minGap) wins.push({ t0: lastEnd + 0.15, t1: n.t - 0.15 });
      if (n.hold) wins.push({ t0: n.t + rate, t1: n.tailT - 0.15 });
      else if (n.dur >= B.minGap * 1.1) wins.push({ t0: n.t + rate * 1.5, t1: n.t + Math.min(n.dur, 3) - 0.12 });
      lastEnd = Math.max(lastEnd, n.hold ? n.tailT : n.t);
    }
    const laneLast = [-9, -9, -9, -9];
    const bursts = [];
    let lastWinT = -Infinity;
    for (const wnd of wins) {
      if (wnd.t0 < lastWinT || wnd.t1 - wnd.t0 < rate * 1.5) continue;
      if (rng() >= B.chance) continue;
      lastWinT = wnd.t1;
      const roll = rng();
      let seq;
      if (roll < B.jackP) {
        const l = Math.floor(rng() * 4);
        seq = k => l;
      } else if (roll < 0.62) {
        const a2 = Math.floor(rng() * 3);
        seq = k => (k % 2 === 0 ? a2 : a2 + 1);
      } else {
        const dir = rng() < 0.5 ? 1 : -1;
        const start = dir === 1 ? 0 : 3;
        seq = k => { const v = (start + dir * k) % 4; return v < 0 ? v + 4 : v; };
      }
      let placed = 0;
      for (let k = 0; placed < B.maxNotes; k++) {
        const bt = wnd.t0 + k * rate;
        if (bt > wnd.t1) break;
        const l = seq(k);
        if (laneBlocked(l, bt) || bt - laneLast[l] < cfg.laneGap) continue;
        bursts.push({ t: bt, lane: l, midi: 72, dur: 0.1, hold: false, tailT: bt });
        laneLast[l] = bt;
        placed++;
      }
    }
    chart.push(...bursts);
  }
  chart.sort((a, b) => a.t - b.t || a.lane - b.lane);
  return chart;
}

function chartStats(chart) {
  if (!chart.length) return { notes: 0, nps: 0, stars: 1, len: 0 };
  const len = chart[chart.length - 1].t - chart[0].t || 1;
  const nps = chart.length / len;
  const stars = nps < 0.8 ? 1 : nps < 1.6 ? 2 : nps < 2.5 ? 3 : nps < 3.8 ? 4 : 5;
  return { notes: chart.length, nps, stars, len };
}

function songMeta(song) {
  const ev = song.events;
  const dur = ev.length ? ev[ev.length - 1].t + (ev[ev.length - 1].dur || 0.5) : 0;
  const sE = chartStats(buildChart(ev, 'easy', song.bpmHint)).stars;
  const sH = chartStats(buildChart(ev, 'virtuoso', song.bpmHint)).stars;
  return { duration: dur, noteCount: ev.length, starLo: Math.min(sE, sH), starHi: Math.max(sE, sH) };
}

/* ---------- persistent storage (window.storage w/ fallback) ---------- */
const mem = {};
const store = {
  async get(key, fallback) {
    try {
      if (typeof window !== 'undefined' && window.storage) {
        const r = await window.storage.get(key);
        return r && r.value != null ? JSON.parse(r.value) : fallback;
      }
    } catch (e) { /* key missing or unavailable */ }
    try {
      if (typeof localStorage !== 'undefined') {
        const v = localStorage.getItem(key);
        if (v != null) return JSON.parse(v);
      }
    } catch (e) { /* private mode etc. */ }
    return key in mem ? mem[key] : fallback;
  },
  async set(key, value) {
    mem[key] = value;
    try {
      if (typeof window !== 'undefined' && window.storage) {
        await window.storage.set(key, JSON.stringify(value));
        return;
      }
    } catch (e) { /* best-effort */ }
    try {
      if (typeof localStorage !== 'undefined') localStorage.setItem(key, JSON.stringify(value));
    } catch (e) { /* best-effort */ }
  },
};

/* ---------- sound engine ---------- */
const Sound = {
  ctx: null, master: null, mix: null, delay: null, comp: null,
  sources: [], voices: 0, maxVoices: 56, volume: 0.85,

  ensure() {
    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.comp = this.ctx.createDynamicsCompressor();
    this.comp.threshold.value = -18; this.comp.ratio.value = 4;
    this.master = this.ctx.createGain();
    this.master.gain.value = this.volume;
    this.mix = this.ctx.createGain();
    // delay send
    this.delay = this.ctx.createDelay(1.0);
    this.delay.delayTime.value = 0.28;
    const fb = this.ctx.createGain(); fb.gain.value = 0.25;
    const wet = this.ctx.createGain(); wet.gain.value = 0.12;
    this.delay.connect(fb); fb.connect(this.delay);
    this.delay.connect(wet);
    this.mix.connect(this.comp);
    this.mix.connect(this.delay);
    wet.connect(this.comp);
    this.comp.connect(this.master);
    this.master.connect(this.ctx.destination);
  },

  setVolume(v) { this.volume = v; if (this.master) this.master.gain.value = v; },

  // celesta / music-box tone
  playTone(midi, when, dur, vel = 0.8) {
    if (!this.ctx || this.voices > this.maxVoices) return;
    const f = midiToFreq(midi);
    const t = Math.max(when, this.ctx.currentTime);
    const decay = clamp((dur || 0.4) * 1.15 + 0.12, 0.3, 2.4);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.16 * vel, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0008, t + decay);
    g.connect(this.mix);
    const partials = [[1, 1], [2.001, 0.35], [3.003, 0.12]];
    for (const [mult, amp] of partials) {
      const o = this.ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f * mult;
      const og = this.ctx.createGain(); og.gain.value = amp;
      o.connect(og); og.connect(g);
      o.start(t); o.stop(t + decay + 0.05);
      this.voices++;
      o.onended = () => { this.voices--; };
      this.sources.push(o);
    }
    if (this.sources.length > 400) this.sources = this.sources.filter(s => { try { return s.context; } catch (e) { return false; } }).slice(-300);
  },

  hitTick() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const len = 0.02;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 1.2;
    const g = this.ctx.createGain(); g.gain.value = 0.07;
    src.connect(bp); bp.connect(g); g.connect(this.comp);
    src.start(t);
  },

  countTick(hi) { this.playTone(hi ? 76 : 69, this.ctx ? this.ctx.currentTime : 0, 0.18, 0.5); },

  stopAll() {
    for (const s of this.sources) { try { s.stop(); } catch (e) {} }
    this.sources = []; this.voices = 0;
  },
};

const INK = '#231f18';
const ACCENT = '#a8352a';
const PAPER = '#f2ecdd';
const IMP_COLORS = ['#e07a52', '#5b9e97', '#b088c9', '#dfa73f', '#87a964'];
function inkA(a) { return 'rgba(35,31,24,' + a + ')'; }
function accA(a) { return 'rgba(168,53,42,' + a + ')'; }
function roman(n) {
  const M = [[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let out = '';
  for (const [v, s] of M) while (n >= v) { out += s; n -= v; }
  return out;
}
const LANE_KEYS = ['d', 'f', 'j', 'k'];
const JUDGE = { perfect: 0.050, great: 0.100, good: 0.150 };
const JUDGE_WEIGHT = { perfect: 1.0, great: 0.6, good: 0.3, miss: 0 };
const GRADES = [
  [0.99, 'SS', 'Bravissimo! A flawless recital.'],
  [0.95, 'S',  'The hall rises to its feet.'],
  [0.90, 'A',  'A stirring performance.'],
  [0.80, 'B',  'Warm applause from the balcony.'],
  [0.65, 'C',  'The critics are... polite.'],
  [0,    'D',  'Every virtuoso began somewhere.'],
];

function gradeFor(acc) { for (const g of GRADES) if (acc >= g[0]) return g; return GRADES[GRADES.length - 1]; }

const G = {
  screen: 'title',
  songs: [],          // {id, title, composer, events, bpmHint, custom, meta}
  scores: {},         // `${songId}|${diff}` -> {score, acc, grade, combo}
  settings: { speed: 5, volume: 0.85, hitSound: true },
  run: null,          // active gameplay state
};

/* ============ boot (browser only) ============ */
function boot() {
  const $ = id => document.getElementById(id);
  const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };

  /* ---------- ambient background ---------- */
  const bgc = $('bgCanvas');
  const bctx = bgc.getContext('2d');
  let bgAnim = true;
  const motes = [];
  const GLYPHS = ['\u266A', '\u266B', '\u2669', '\u266D', '\u266F'];
  function seedMotes() {
    motes.length = 0;
    const n = Math.floor(window.innerWidth / 34);
    for (let i = 0; i < n; i++) {
      motes.push({
        x: Math.random() * bgc.width, y: Math.random() * bgc.height,
        r: Math.random() * 1.6 + 0.4, vy: -(Math.random() * 8 + 3) / 60, vx: (Math.random() - 0.5) * 6 / 60,
        a: Math.random() * 0.08 + 0.03,
        glyph: Math.random() < 0.12 ? GLYPHS[Math.floor(Math.random() * GLYPHS.length)] : null,
        rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.004,
      });
    }
  }
  function sizeBg() {
    bgc.width = window.innerWidth; bgc.height = window.innerHeight;
    seedMotes();
  }
  window.addEventListener('resize', sizeBg); sizeBg();
  function drawBg() {
    if (bgAnim) {
      bctx.clearRect(0, 0, bgc.width, bgc.height);
      for (const m of motes) {
        m.x += m.vx; m.y += m.vy; m.rot += m.vr;
        if (m.y < -20) { m.y = bgc.height + 10; m.x = Math.random() * bgc.width; }
        if (m.x < -20) m.x = bgc.width + 10; if (m.x > bgc.width + 20) m.x = -10;
        bctx.globalAlpha = m.a;
        if (m.glyph) {
          bctx.save(); bctx.translate(m.x, m.y); bctx.rotate(m.rot);
          bctx.fillStyle = '#3a352b'; bctx.font = '13px Georgia, serif';
          bctx.fillText(m.glyph, 0, 0); bctx.restore();
        } else {
          bctx.fillStyle = '#3a352b';
          bctx.beginPath(); bctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); bctx.fill();
        }
      }
      bctx.globalAlpha = 1;
    }
    requestAnimationFrame(drawBg);
  }
  requestAnimationFrame(drawBg);

  /* ---------- screen switching ---------- */
  function show(name) {
    G.screen = name;
    for (const s of document.querySelectorAll('.screen')) s.classList.remove('active');
    $('screen-' + name).classList.add('active');
    bgAnim = name !== 'game';
  }

  /* ---------- toast ---------- */
  let toastTimer = null;
  function toast(msg, bad) {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'show' + (bad ? ' bad' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3200);
  }

  /* ---------- modal ---------- */
  function openModal(html) { $('modalBody').innerHTML = ''; if (typeof html === 'string') $('modalBody').innerHTML = html; else $('modalBody').appendChild(html); $('modal').classList.add('open'); }
  function closeModal() { $('modal').classList.remove('open'); stopPreview(); }
  $('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
  $('modalClose').addEventListener('click', closeModal);

  /* ---------- preview playback ---------- */
  let previewTimer = null;
  function stopPreview() {
    if (previewTimer) { clearInterval(previewTimer); previewTimer = null; Sound.stopAll(); }
    const b = document.querySelector('.previewBtn.playing');
    if (b) { b.classList.remove('playing'); b.textContent = '\u25B6 Preview'; }
  }
  function togglePreview(song, btn) {
    if (btn.classList.contains('playing')) { stopPreview(); return; }
    stopPreview();
    Sound.ensure();
    btn.classList.add('playing'); btn.textContent = '\u25A0 Stop';
    const start = Sound.ctx.currentTime + 0.1;
    const cutoff = 14; // seconds of preview
    let i = 0;
    const evs = song.events;
    function pump() {
      const now = Sound.ctx.currentTime;
      while (i < evs.length && evs[i].t + start < now + 0.9) {
        if (evs[i].t > cutoff) { stopPreview(); return; }
        Sound.playTone(evs[i].midi, start + evs[i].t, evs[i].dur, 0.7);
        i++;
      }
      if (i >= evs.length || (now - start) > cutoff) stopPreview();
    }
    pump();
    previewTimer = setInterval(pump, 300);
  }

  /* ---------- song select ---------- */
  function bestChip(songId) {
    let best = null;
    for (const d of DIFFS) {
      const s = G.scores[songId + '|' + d];
      if (s && (!best || s.acc > best.acc)) best = s;
    }
    return best;
  }

  const expandState = {};
  expandState[SUITES[0].id] = true;

  function songPlayed(id) { return DIFFS.some(d => G.scores[id + '|' + d]); }

  function renderSongs() {
    const grid = $('songGrid');
    grid.innerHTML = '';
    for (const sv of SUITES) {
      const played = sv.songs.filter(s => songPlayed(s.id)).length;
      const open = !!expandState[sv.id];
      const head = el('div', 'suiteHead' + (open ? '' : ' closed'),
        '<h3>' + esc(sv.name) + '</h3>' +
        '<span class="prog">' + played + ' of ' + sv.songs.length + ' performed</span>' +
        '<span class="chev">\u25BE</span>');
      head.addEventListener('click', () => { expandState[sv.id] = !expandState[sv.id]; renderSongs(); });
      grid.appendChild(head);
      if (!open) continue;
      sv.songs.forEach((song, idx) => {
        const unlocked = idx === 0 || songPlayed(sv.songs[idx - 1].id);
        grid.appendChild(makeRow(song, String(idx + 1) + '.', unlocked));
      });
    }
    // encores: uploads
    const customs = G.songs.filter(s => s.custom);
    const head = el('div', 'suiteHead',
      '<h3>Encores \u00B7 Your Library</h3><span class="prog">' + customs.length + (customs.length === 1 ? ' piece' : ' pieces') + '</span>');
    grid.appendChild(head);
    for (const song of customs) grid.appendChild(makeRow(song, '\u266A', true));
    const up = el('div', 'progRow uploadRow',
      '<span class="num">\u2767</span>' +
      '<span class="pMain"><span class="pTitle">Bring your own score</span>' +
      '<span class="pMeta">MusicXML \u00B7 .mxl \u00B7 MIDI</span></span>' +
      '<span class="leader"></span><span class="pComposer">upload</span><span class="sealGhost"></span>');
    up.addEventListener('click', () => $('fileInput').click());
    grid.appendChild(up);
  }

  function makeRow(song, numLabel, unlocked) {
    if (!song.meta) song.meta = songMeta(song);
    const m = song.meta;
    const row = el('div', 'progRow' + (unlocked ? '' : ' locked'));
    const stars = m.starLo === m.starHi ? '\u2605'.repeat(m.starLo)
      : '\u2605'.repeat(m.starLo) + '\u2013' + '\u2605'.repeat(m.starHi);
    const best = bestChip(song.id);
    row.innerHTML =
      '<span class="num">' + numLabel + '</span>' +
      '<span class="pMain"><span class="pTitle">' + esc(song.title) + '</span>' +
        '<span class="pMeta">' + (unlocked
          ? fmtTime(m.duration) + ' \u00B7 ' + m.noteCount + ' notes \u00B7 <span class="pStars">' + stars + '</span>'
          : 'play the previous piece to unlock') + '</span></span>' +
      '<span class="leader"></span>' +
      '<span class="pComposer">' + esc(song.composer || '') + '</span>' +
      (best ? '<span class="seal' + (best.fc ? ' fc' : '') + '">' + best.grade + '</span>' : '<span class="sealGhost"></span>');
    if (song.custom) {
      const del = el('button', 'delBtn', '\u00D7');
      del.title = 'Remove from programme';
      del.addEventListener('click', async e => {
        e.stopPropagation();
        G.songs = G.songs.filter(s => s.id !== song.id);
        await store.set('cadenza:songs', G.songs.filter(s => s.custom).map(s => ({ id: s.id, title: s.title, composer: s.composer, events: s.events, bpmHint: s.bpmHint, custom: true })));
        toast('Struck \u201C' + song.title + '\u201D from the programme');
        renderSongs();
      });
      row.appendChild(del);
    }
    if (unlocked) row.addEventListener('click', () => openDifficulty(song));
    else row.addEventListener('click', () => toast('Perform the previous piece first \u2014 the maestro insists.', true));
    return row;
  }

  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

  /* ---------- difficulty modal ---------- */
  function openDifficulty(song) {
    const wrap = el('div', 'diffWrap');

        '<span class="dNotes">' + st.notes + ' notes</span>' +
        (sc ? '<span class="dBest grade-' + sc.grade + '">' + sc.grade + ' ' + (sc.acc * 100).toFixed(1) + '%</span>' : '<span class="dBest dim">\u2014</span>'));
      row.addEventListener('click', () => { closeModal(); startGame(song, d); });
      list.appendChild(row);
